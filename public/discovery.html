<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klinik Bul — Cliniflow</title>
  <script src="/api-base.js?v=202605071"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e6eaf2;
      margin: 0;
      padding: 24px 16px 48px;
    }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .muted { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
    label { display: block; margin-top: 12px; margin-bottom: 6px; font-weight: 600; }
    select, input[type="text"] {
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e6eaf2;
      font-size: 1rem;
    }
    button {
      margin-top: 16px;
      padding: 12px 20px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; min-height: 1.25rem; }
    .err { color: #fca5a5; }
    #results {
      margin-top: 28px;
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
    }
    .card h2 { margin: 0 0 8px; font-size: 1.1rem; color: #f8fafc; }
    .card .meta { color: #94a3b8; font-size: 0.9rem; }
    .card .rating { margin-top: 8px; color: #fbbf24; font-weight: 600; }
    .wrap { max-width: 960px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Klinik Bul</h1>
    <p class="muted">Ülke seçin; isterseniz şehir ile daraltın. Şehir boş bırakılırsa seçilen ülkedeki tüm kayıtlı klinikler listelenir.</p>

    <label for="countrySelect">Ülke</label>
    <select id="countrySelect" aria-label="Ülke"></select>
    <div id="countryWarn" class="err" style="margin-top:6px;font-size:0.9rem;">Lütfen ülke seçin</div>

    <label for="cityInput">Şehir <span class="muted" style="font-weight:400;">(isteğe bağlı)</span></label>
    <input type="text" id="cityInput" placeholder="Örn. Antalya" autocomplete="address-level2" />

    <button type="button" id="searchBtn" disabled>Ara</button>
    <div id="status"></div>
    <div id="results"></div>
  </div>

  <script>
    (function () {
      var sel = document.getElementById("countrySelect");
      var btn = document.getElementById("searchBtn");
      var countryWarn = document.getElementById("countryWarn");

      function apiOrigin() {
        return typeof cliniflowApiBase === "function" ? cliniflowApiBase() : "";
      }

      function rebuildCountrySelect(codes) {
        sel.innerHTML = "";
        var ph = document.createElement("option");
        ph.value = "";
        ph.textContent = "Ülke seçin";
        sel.appendChild(ph);
        (codes || []).forEach(function (code) {
          var c = String(code || "").trim().toUpperCase();
          if (!/^[A-Z]{2}$/.test(c)) return;
          var o = document.createElement("option");
          o.value = c;
          o.textContent = c;
          sel.appendChild(o);
        });
        updateCountryRequirementUi();
      }

      async function loadCountries() {
        rebuildCountrySelect([]);
        try {
          var base = apiOrigin().replace(/\/+$/, "");
          var res = await fetch((base ? base : "") + "/api/discovery/countries", {
            headers: { Accept: "application/json" },
          });
          var data = await res.json().catch(function () {
            return {};
          });
          if (!res.ok || data.ok === false) {
            console.warn("[discovery/countries]", data.error || res.status);
            return;
          }
          rebuildCountrySelect(Array.isArray(data.countries) ? data.countries : []);
        } catch (e) {
          console.warn("[discovery/countries]", e);
        }
      }

      function updateCountryRequirementUi() {
        var country = String(sel.value || "").trim().toUpperCase();
        var ok = country.length === 2;
        btn.disabled = !ok;
        if (countryWarn) countryWarn.style.display = ok ? "none" : "block";
      }

      sel.addEventListener("change", updateCountryRequirementUi);

      loadCountries();

      function renderCards(list) {
        var root = document.getElementById("results");
        root.innerHTML = "";
        if (!list || !list.length) {
          root.innerHTML = '<p class="muted">Klinik bulunamadı.</p>';
          return;
        }
        list.forEach(function (c) {
          var el = document.createElement("article");
          el.className = "card";
          var cityLine = c.city ? escapeHtml(c.city) : "—";
          var ratingLine =
            c.rating != null && c.rating !== ""
              ? "★ " + escapeHtml(String(c.rating))
              : "Henüz puan yok";
          el.innerHTML =
            "<h2>" + escapeHtml(c.name || "Klinik") + "</h2>" +
            '<div class="meta">' + cityLine + "</div>" +
            '<div class="rating">' + ratingLine + "</div>";
          root.appendChild(el);
        });
      }

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      async function runSearch() {
        var status = document.getElementById("status");
        var country = String(sel.value || "").trim().toUpperCase();
        var city = document.getElementById("cityInput").value.trim();

        status.innerHTML = "";
        if (!country || country.length !== 2) {
          status.innerHTML = '<span class="err">Lütfen ülke seçin</span>';
          updateCountryRequirementUi();
          return;
        }

        var base = apiOrigin().replace(/\/+$/, "");
        var url =
          (base ? base : "") +
          "/api/discovery/clinics?country=" +
          encodeURIComponent(country) +
          "&city=" +
          encodeURIComponent(city);

        btn.disabled = true;
        try {
          var res = await fetch(url, { headers: { Accept: "application/json" } });
          var data = await res.json().catch(function () {
            return {};
          });
          if (!res.ok) {
            status.innerHTML =
              '<span class="err">' +
              escapeHtml(data.message || data.error || "İstek başarısız") +
              "</span>";
            renderCards([]);
            return;
          }
          renderCards(data.clinics || []);
          status.innerHTML =
            '<span class="muted">' +
            (data.clinics ? data.clinics.length : 0) +
            " klinik</span>";
        } catch (e) {
          status.innerHTML = '<span class="err">Bağlantı hatası.</span>';
          renderCards([]);
        } finally {
          updateCountryRequirementUi();
        }
      }

      document.getElementById("searchBtn").addEventListener("click", runSearch);
    })();
  </script>
</body>
</html>
