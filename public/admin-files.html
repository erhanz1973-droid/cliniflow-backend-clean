<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <script src="/api-base.js?v=202603301"></script>
  <title data-i18n="files.pageTitle">Admin – Hasta Dosyaları</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function() {
      const token = localStorage.getItem("adminToken");
      if (!token) window.location.href = "/admin-login.html";
    })();
  </script>
  <script src="/admin-i18n.js?v=20"></script>
  <link rel="stylesheet" href="/admin-layout.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Arial; background: #0f172a; color: #e6eaf2; }

    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px 12px;
      border-bottom: 1px solid #1e293b;
    }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .patient-label {
      font-size: 13px; color: #94a3b8;
      background: #1e293b; padding: 4px 12px; border-radius: 20px;
    }

    /* ── Toolbar ────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 14px 24px; background: #0f172a;
    }
    .patient-select-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
    .patient-select-wrap label { font-size: 13px; color: #94a3b8; white-space: nowrap; }
    select.patient-sel {
      background: #1e293b; border: 1px solid #334155; color: #e6eaf2;
      border-radius: 8px; padding: 7px 12px; font-size: 13px; flex: 1; cursor: pointer;
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .tab-btn.active { background: #6d28d9; border-color: #7c3aed; color: #fff; }
    .tab-btn:hover:not(.active) { border-color: #475569; color: #e6eaf2; }

    /* ── Upload button ──────────────────────────────────────── */
    .btn-upload {
      background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd;
      border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all .15s;
      white-space: nowrap;
    }
    .btn-upload:hover { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
    #uploadInput { display: none; }

    /* ── Grid ───────────────────────────────────────────────── */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px; padding: 20px 24px;
    }
    .file-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: all .15s;
      display: flex; flex-direction: column;
    }
    .file-card:hover { border-color: #6d28d9; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(109,40,217,.25); }

    .file-thumb {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      background: #0f172a; display: flex; align-items: center; justify-content: center;
      font-size: 42px; flex-shrink: 0;
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .file-info { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .file-name { font-size: 12px; font-weight: 600; color: #e2e8f0; word-break: break-word; line-height: 1.4; }
    .file-meta { font-size: 11px; color: #64748b; }
    .file-type-badge {
      display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase;
      padding: 2px 7px; border-radius: 10px; margin-top: 2px;
    }
    .badge-image  { background: #1e3a2f; color: #4ade80; }
    .badge-xray   { background: #1e2a3a; color: #60a5fa; }
    .badge-pdf    { background: #3a1e1e; color: #f87171; }
    .badge-file   { background: #2a2a1e; color: #facc15; }
    .badge-chat   { background: #1e2a3a; color: #a78bfa; }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 24px; color: #475569;
    }
    .empty-state-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    /* ── Loading ────────────────────────────────────────────── */
    .loading-wrap { text-align: center; padding: 60px; color: #64748b; font-size: 14px; }

    /* ── Lightbox ───────────────────────────────────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.92); align-items: center; justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightboxImg { max-width: 92vw; max-height: 82vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
    #lightboxMeta { margin-top: 14px; color: #cbd5e1; font-size: 13px; text-align: center; line-height: 1.7; }
    #lightboxClose {
      position: absolute; top: 20px; right: 24px; font-size: 28px; cursor: pointer;
      color: #94a3b8; background: none; border: none; line-height: 1;
    }
    #lightboxClose:hover { color: #fff; }
    #lightboxNav {
      display: flex; gap: 20px; margin-top: 18px;
    }
    .lb-btn {
      background: #1e293b; border: 1px solid #334155; color: #e6eaf2;
      border-radius: 8px; padding: 7px 20px; font-size: 13px; cursor: pointer;
    }
    .lb-btn:hover { background: #334155; }
    .lb-download {
      background: #1e3a5f; border-color: #2563eb; color: #93c5fd;
    }
    .lb-download:hover { background: #1d4ed8; color: #fff; }
  </style>
</head>
<body>

<div id="layoutWrapper">
  <div class="page-header">
    <h1 data-i18n="files.title">📁 Hasta Dosyaları</h1>
    <span class="patient-label" id="patientLabel">—</span>
  </div>

  <div class="toolbar">
    <div class="patient-select-wrap">
      <label data-i18n="files.selectPatient">Hasta:</label>
      <select class="patient-sel" id="patientSelect">
        <option value="" data-i18n="files.selectPlaceholder">Hasta seçin...</option>
      </select>
    </div>

    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all" data-i18n="files.filterAll">Tümü</button>
      <button class="tab-btn" data-filter="image" data-i18n="files.filterPhoto">📸 Fotoğraf</button>
      <button class="tab-btn" data-filter="xray" data-i18n="files.filterXray">🦷 Röntgen</button>
      <button class="tab-btn" data-filter="pdf" data-i18n="files.filterPdf">📄 PDF</button>
      <button class="tab-btn" data-filter="chat" data-i18n="files.filterChat">💬 Chat</button>
    </div>

    <label class="btn-upload" for="uploadInput">
      ⬆️ <span data-i18n="files.upload">Yükle</span>
    </label>
    <input type="file" id="uploadInput" accept="image/*,.pdf,.heic,.heif" multiple />
    <button class="tab-btn" onclick="runDebug()" title="Debug: ham veri göster" style="border-color:#475569;color:#64748b;">🔍</button>
  </div>

  <div id="filesContainer">
    <div class="empty-state">
      <div class="empty-state-icon">📂</div>
      <p data-i18n="files.selectToView">Dosyaları görmek için hasta seçin.</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightboxClose" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" />
  <div id="lightboxMeta"></div>
  <div id="lightboxNav">
    <button class="lb-btn" onclick="lightboxPrev()" data-i18n="common.previous">◀</button>
    <a id="lightboxDownload" class="lb-btn lb-download" href="#" download target="_blank" data-i18n="files.download">⬇️</a>
    <button class="lb-btn" onclick="lightboxNext()" data-i18n="common.next">▶</button>
  </div>
</div>

<script src="/admin-layout.js?v=202605021"></script>
<script>
  const API = '';
  const params = new URLSearchParams(location.search);
  let currentPatientId = params.get('patientId') || localStorage.getItem('selected_patient_id') || '';
  let allFiles = [];
  let filteredFiles = [];
  let activeFilter = 'all';
  let lightboxIndex = 0;

  function getAdminToken() { return localStorage.getItem('adminToken') || ''; }
  function adminHeaders(extra = {}) { return { Authorization: `Bearer ${getAdminToken()}`, ...extra }; }

  // ── Patient list ───────────────────────────────────────────
  async function loadPatients() {
    try {
      const res = await fetch(`${API}/api/admin/patients`, { headers: adminHeaders({ Accept: 'application/json' }) });
      if (!res.ok) return;
      const data = await res.json();
      const patients = data.patients || data.data || data || [];
      const sel = document.getElementById('patientSelect');
      patients.forEach(p => {
        const id = p.id || p.patient_id;
        const name = String(p.name || p.full_name || `${p.first_name || ''} ${p.last_name || ''}`.trim() || id).trim();
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = `${name} (${p.patient_id || id})`;
        sel.appendChild(opt);
      });
      if (currentPatientId) sel.value = currentPatientId;
    } catch (e) { console.error('[FILES] loadPatients error:', e); }
  }

  // ── Resolve URL: handle relative paths, Supabase storage, etc. ───────────────
  function resolveUrl(url) {
    if (!url) return '';
    // Already absolute URL (Supabase storage, CDN, etc.)
    if (url.startsWith('http://') || url.startsWith('https://')) return url;
    // Relative path — prepend current origin
    if (url.startsWith('/')) {
      const b = typeof cliniflowApiBase === 'function' ? cliniflowApiBase() : '';
      return (b || window.location.origin) + url;
    }
    return url;
  }

  // ── Load files ─────────────────────────────────────────────
  async function loadFiles(patientId) {
    if (!patientId) return;
    currentPatientId = patientId;

    const container = document.getElementById('filesContainer');
    container.innerHTML = '<div class="loading-wrap">⏳ Yükleniyor...</div>';

    // Update patient label
    const sel = document.getElementById('patientSelect');
    const opt = sel.options[sel.selectedIndex];
    const label = opt && opt.value ? (opt.textContent.split('(')[0].trim()) : patientId;
    document.getElementById('patientLabel').textContent = label || patientId;

    try {
      const res = await fetch(`${API}/api/admin/patient/${encodeURIComponent(patientId)}/files`, {
        headers: adminHeaders({ Accept: 'application/json' })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // Normalize URLs
      allFiles = (data.files || []).map(f => ({ ...f, url: resolveUrl(f.url) }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (allFiles.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">📂</div>
          <p>Bu hasta için kayıtlı dosya bulunamadı.</p>
          <p style="font-size:12px;color:#475569;margin-top:8px;">
            Patient ID: <code>${escHtml(patientId)}</code>
          </p>
          <button onclick="runDebug()" style="margin-top:12px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;">🔍 Debug Bilgisi Göster</button>
        </div>`;
        return;
      }

      applyFilter(activeFilter);
    } catch (e) {
      console.error('[FILES] loadFiles error:', e);
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  // ── Debug ──────────────────────────────────────────────────
  async function runDebug() {
    if (!currentPatientId) { alert('Önce hasta seçin'); return; }
    const container = document.getElementById('filesContainer');
    container.innerHTML = '<div class="loading-wrap">🔍 Debug bilgisi alınıyor...</div>';
    try {
      const res = await fetch(`${API}/api/admin/patient/${encodeURIComponent(currentPatientId)}/files?debug=1`, {
        headers: adminHeaders({ Accept: 'application/json' })
      });
      const data = await res.json();
      const d = data.debug || {};
      container.innerHTML = `<div style="padding:20px 24px;font-size:12px;font-family:monospace;color:#94a3b8;line-height:1.8;">
        <div style="color:#f8fafc;font-size:14px;font-weight:700;margin-bottom:12px;">🔍 Debug Bilgisi</div>
        <div>✅ Supabase aktif: <strong style="color:${d.supabaseEnabled ? '#4ade80':'#f87171'}">${d.supabaseEnabled}</strong></div>
        <div>👤 Çözülen UUID: <code style="color:#c4b5fd">${d.resolvedUUID || '—'}</code></div>
        <div>📁 patient_files satırları: <strong style="color:#60a5fa">${(d.patient_files_rows || []).length}</strong></div>
        ${d.patient_files_error ? `<div style="color:#f87171">❌ patient_files hata: ${escHtml(d.patient_files_error)}</div>` : ''}
        <div>💬 Mesaj ekleri: <strong style="color:#60a5fa">${d.messages_with_attachments || 0}</strong></div>
        ${d.messages_error ? `<div style="color:#f87171">❌ messages hata: ${escHtml(d.messages_error)}</div>` : ''}
        <div>📂 Disk intraoral: <strong style="color:${d.intraoral_disk_exists?'#4ade80':'#f87171'}">${d.intraoral_disk_exists ? '✓' : '✗'}</strong> (${(d.intraoral_files||[]).length} dosya)</div>
        <div>📂 Disk patient: <strong style="color:${d.patient_disk_exists?'#4ade80':'#f87171'}">${d.patient_disk_exists ? '✓' : '✗'}</strong> (${(d.patient_disk_files||[]).length} dosya)</div>
        <div style="margin-top:12px;color:#f8fafc;font-weight:700;">📋 patient_files URL'leri:</div>
        ${(d.patient_files_rows || []).map(r => `<div style="margin-left:8px;word-break:break-all;"><code style="color:#a78bfa">${escHtml(r.file_url || '—')}</code> <span style="color:#64748b">[${escHtml(r.file_type||'')}]</span></div>`).join('') || '<div style="color:#64748b;margin-left:8px;">Kayıt yok</div>'}
        <div style="margin-top:12px;">
          <button onclick="loadFiles('${escHtml(currentPatientId)}')" style="background:#1e293b;border:1px solid #334155;color:#e6eaf2;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;">← Geri Dön</button>
        </div>
      </div>`;
    } catch (e) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  // ── Filter ─────────────────────────────────────────────────
  function applyFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));

    filteredFiles = filter === 'all'
      ? allFiles
      : allFiles.filter(f => {
          if (filter === 'chat') return f.source === 'chat';
          return (f.fileType || '').startsWith(filter);
        });

    renderGrid(filteredFiles);
  }

  // ── Render ─────────────────────────────────────────────────
  function renderGrid(files) {
    const container = document.getElementById('filesContainer');
    if (!files.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📂</div><p>${window.i18n ? window.i18n.t('files.empty') : 'Dosya bulunamadı.'}</p></div>`;
      return;
    }

    container.innerHTML = `<div class="files-grid">${files.map((f, i) => fileCard(f, i)).join('')}</div>`;
  }

  function fileCard(f, index) {
    const isImage = f.fileType === 'image' || f.fileType === 'xray' || (f.mimeType || '').startsWith('image/');
    const isPdf = f.fileType === 'pdf' || (f.mimeType || '').includes('pdf');
    const icon = f.fileType === 'xray' ? '🦷' : isPdf ? '📄' : isImage ? '📸' : '📎';
    const badgeClass = f.source === 'chat' ? 'badge-chat' : `badge-${f.fileType || 'file'}`;
    const badgeLabel = f.source === 'chat' ? 'Chat'
      : f.fileType === 'xray' ? 'Röntgen'
      : f.fileType === 'image' ? 'Fotoğraf'
      : f.fileType === 'pdf' ? 'PDF' : 'Dosya';

    const dateStr = f.createdAt ? new Date(f.createdAt).toLocaleDateString('tr-TR', { day:'numeric', month:'short', year:'numeric' }) : '';
    const sizeStr = f.size ? formatSize(f.size) : '';

    const thumbHtml = isImage
      ? `<div class="file-thumb"><img src="${escHtml(f.url)}" alt="${escHtml(f.name)}" loading="lazy" crossorigin="anonymous" onerror="this.onerror=null;this.parentElement.innerHTML='<div style=\\'font-size:32px;display:flex;align-items:center;justify-content:center;height:100%;\\'>${icon}<span style=\\'font-size:10px;color:#ef4444;margin-left:4px;\\'>⚠️</span></div>'" /></div>`
      : `<div class="file-thumb" style="font-size:40px; display:flex; align-items:center; justify-content:center;">${icon}</div>`;

    return `
      <div class="file-card" onclick="openLightbox(${index})">
        ${thumbHtml}
        <div class="file-info">
          <div class="file-name">${escHtml(f.name || 'Dosya')}</div>
          <div class="file-meta">${dateStr}${sizeStr ? ' • ' + sizeStr : ''}</div>
          <span class="file-type-badge ${badgeClass}">${badgeLabel}</span>
        </div>
      </div>`;
  }

  function formatSize(bytes) {
    if (bytes >= 1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
    if (bytes >= 1024) return Math.round(bytes/1024) + ' KB';
    return bytes + ' B';
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Lightbox ───────────────────────────────────────────────
  function openLightbox(index) {
    lightboxIndex = index;
    showLightboxItem();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLightboxItem() {
    const f = filteredFiles[lightboxIndex];
    if (!f) return;
    const isImage = f.fileType === 'image' || f.fileType === 'xray' || (f.mimeType || '').startsWith('image/');
    const img = document.getElementById('lightboxImg');
    const meta = document.getElementById('lightboxMeta');
    const dl = document.getElementById('lightboxDownload');

    if (isImage) {
      img.src = f.url;
      img.style.display = 'block';
    } else {
      img.src = '';
      img.style.display = 'none';
      // Open PDF in new tab directly
      window.open(f.url, '_blank');
      closeLightbox();
      return;
    }

    const dateStr = f.createdAt ? new Date(f.createdAt).toLocaleString('tr-TR') : '';
    const sizeStr = f.size ? formatSize(f.size) : '';
    meta.innerHTML = `<strong>${escHtml(f.name || 'Dosya')}</strong><br>${dateStr}${sizeStr ? ' • ' + sizeStr : ''}`;

    dl.href = f.url;
    dl.download = f.name || 'dosya';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('lightboxImg').src = '';
  }

  function lightboxPrev() {
    if (lightboxIndex > 0) { lightboxIndex--; showLightboxItem(); }
  }

  function lightboxNext() {
    if (lightboxIndex < filteredFiles.length - 1) { lightboxIndex++; showLightboxItem(); }
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxPrev();
    if (e.key === 'ArrowRight') lightboxNext();
  });

  // ── Upload ─────────────────────────────────────────────────
  document.getElementById('uploadInput').addEventListener('change', async function() {
    const pid = currentPatientId;
    if (!pid) { alert('Lütfen önce hasta seçin.'); this.value = ''; return; }
    const files = Array.from(this.files);
    if (!files.length) return;

    const token = getAdminToken();
    let uploaded = 0;
    for (const file of files) {
      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('patientId', pid);
        fd.append('fileType', file.type.startsWith('image/') ? 'image' : 'file');
        const res = await fetch(`${API}/api/admin/patient/${encodeURIComponent(pid)}/upload`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: fd
        });
        if (res.ok) uploaded++;
      } catch (e) { console.error('[FILES] upload error:', e); }
    }
    this.value = '';
    if (uploaded > 0) loadFiles(pid);
  });

  // ── Filter tab clicks ──────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  // ── Patient select ─────────────────────────────────────────
  document.getElementById('patientSelect').addEventListener('change', function() {
    const pid = this.value;
    if (pid) {
      localStorage.setItem('selected_patient_id', pid);
      loadFiles(pid);
    }
  });

  // ── Init ───────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    await loadPatients();
    if (currentPatientId) {
      document.getElementById('patientSelect').value = currentPatientId;
      await loadFiles(currentPatientId);
    }
  });
</script>
</body>
</html>
