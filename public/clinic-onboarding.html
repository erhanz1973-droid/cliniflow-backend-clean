<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle"></title>
  <script src="/api-base.js?v=202604275"></script>
  <style>
    #langBar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
      position: relative;
      z-index: 10;
      pointer-events: auto;
    }
    #langBar button {
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #cbd5e1;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s;
    }
    #langBar button:hover {
      background: #334155;
      border-color: #475569;
    }
    #langBar button.active {
      background: #2563eb;
      border-color: #3b82f6;
      color: #f8fafc;
    }
  </style>
</head>
<body style="font-family: system-ui,sans-serif;background:#0f172a;color:#e6eaf2;margin:24px;">
  <div id="langBar">
    <button type="button" data-lang="tr">TR</button>
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="ru">RU</button>
    <button type="button" data-lang="ka">KA</button>
  </div>

  <h1 id="onboardingTitle"></h1>
  <p id="onboardingSubtitle" style="color:#94a3b8;"></p>
  <p style="color:#64748b;font-size:14px;margin-top:1.25rem;">
    Shared: <code>/i18n.js</code> · This page: <code>/onboarding.js</code> only (not <code>find-clinic.js</code>).
    <a href="/find-clinic.html" style="color:#60a5fa;">Find Clinic</a>
  </p>
  <script src="/i18n.js"></script>
  <script src="/onboarding.js"></script>
</body>
</html>
