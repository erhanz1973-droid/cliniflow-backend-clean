<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/api-base.js?v=202605098"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="referrals.title">Clinifly Admin – Referrals</title>
  <script>
    (function() {
      const token = localStorage.getItem("adminToken") || localStorage.getItem("admin_token");
      if (!token) window.location.href = "/admin-login.html";
    })();
  </script>
  <script src="/admin-i18n.js?v=35"></script>
  <link rel="stylesheet" href="/admin-layout.css" />
  <script src="/admin-layout.js?v=202605082" defer></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #111827; color: #e6eaf2; }
    body.al-ready { background: #111827; color: #e6eaf2; }
    body.al-ready .al-topbar { background: #1f2937; border-bottom-color: #374151; }
    body.al-ready .al-topbar .al-page-title { color: #e5e7eb; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 800; color: #f1f5f9; margin: 0; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 18px 20px; }
    .stat-label { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: #f1f5f9; }

    /* Table */
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 14px; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #374151; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .refresh-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .refresh-btn:hover { background: #1d4ed8; }

    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; background: #111827; }
    tbody tr { border-top: 1px solid #374151; transition: background .15s; }
    tbody tr:hover { background: #0f172a; }
    tbody td { padding: 14px 16px; font-size: 14px; color: #e2e8f0; }

    .referrer-name { font-weight: 700; color: #f1f5f9; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-invited    { background: #312e81; color: #a5b4fc; }
    .badge-registered { background: #1e3a5f; color: #93c5fd; }
    .badge-treated    { background: #14532d; color: #86efac; }
    .badge-rewarded   { background: #713f12; color: #fcd34d; }

    .count-cell { font-size: 18px; font-weight: 800; text-align: center; }
    .count-invited    { color: #818cf8; }
    .count-registered { color: #60a5fa; }
    .count-treated    { color: #4ade80; }

    .empty { text-align: center; padding: 48px 20px; color: #64748b; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .loading-row td { text-align: center; padding: 32px; color: #64748b; }

    /* Status filter */
    .filter-row { display: flex; gap: 8px; align-items: center; }
    select { background: #111827; border: 1px solid #374151; color: #e2e8f0; border-radius: 8px; padding: 7px 12px; font-size: 13px; }

    .progress-bar { width: 100%; background: #374151; border-radius: 4px; height: 6px; margin-top: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #2563eb; border-radius: 4px; transition: width .3s; }

    .actions-cell { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn-approve { background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-approve:hover:not(:disabled) { background: #15803d; }
    .btn-reject { background: transparent; color: #f87171; border: 1px solid #991b1b; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-reject:hover:not(:disabled) { background: rgba(153, 27, 27, 0.15); }
    .btn-approve:disabled, .btn-reject:disabled { opacity: 0.45; cursor: not-allowed; }
    .pending-code { font-family: ui-monospace, monospace; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page-header">
      <h1 class="page-title" data-i18n="referrals.activityPageTitle">🎁 Referral activity</h1>
      <button type="button" class="refresh-btn" onclick="load()" data-i18n="referrals.refresh">↻ Refresh</button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label" data-i18n="referrals.statTotalReferrers">Total referrers</div><div class="stat-value" id="statReferrers">—</div></div>
      <div class="stat-card" data-i18n-title="referrals.statInvitedUtcMonthTitle">
        <div class="stat-label" data-i18n="referrals.statInvitedUtcMonth">Invited this UTC month</div>
        <div class="stat-value" id="statInvitedUtcMonth">—</div>
      </div>
      <div class="stat-card"><div class="stat-label" data-i18n="referrals.statTotalInvitedAllTime">Total invited (all time)</div><div class="stat-value" id="statInvited">—</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="referrals.statRegistered">Registered</div><div class="stat-value" id="statRegistered">—</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="referrals.statTreated">Treated</div><div class="stat-value" id="statTreated">—</div></div>
      <div class="stat-card"><div class="stat-label" data-i18n="referrals.statPending">Pending approval</div><div class="stat-value" id="statPending">—</div></div>
    </div>

    <!-- Pending admin approval -->
    <div class="card" id="pendingApprovalCard" style="margin-bottom: 24px;">
      <div class="card-header">
        <span class="card-title" data-i18n="referrals.pendingSectionTitle">Referrals pending approval</span>
      </div>
      <table>
        <thead>
          <tr>
            <th data-i18n="referrals.inviter">Inviter</th>
            <th data-i18n="referrals.invited">Invited</th>
            <th data-i18n="referrals.thStatus">Status</th>
            <th data-i18n="referrals.thCode">Code</th>
            <th data-i18n="referrals.thDate">Date</th>
            <th style="min-width: 160px;" data-i18n="referrals.thActions">Actions</th>
          </tr>
        </thead>
        <tbody id="pendingBody">
          <tr class="loading-row"><td colspan="6" data-i18n="referrals.loadingMain">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title" data-i18n="referrals.summaryTitle">Referrer summary</span>
        <div class="filter-row">
          <select id="statusFilter" onchange="load()">
            <option value="" data-i18n="referrals.filterAllStatuses">All statuses</option>
            <option value="registered" data-i18n="referrals.filterRegisteredOpt">Registered</option>
            <option value="treated" data-i18n="referrals.filterTreatedOpt">Treated</option>
            <option value="rewarded" data-i18n="referrals.filterRewardedOpt">Rewarded</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th data-i18n="referrals.thReferrer">Referrer</th>
            <th style="text-align:center;" data-i18n="referrals.thInvitedCount">Invited</th>
            <th style="text-align:center;" data-i18n="referrals.thRegisteredCount">Registered</th>
            <th style="text-align:center;" data-i18n="referrals.thTreatedCount">Treated</th>
            <th data-i18n="referrals.thInvitedPatients">Invited patients</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="5" data-i18n="referrals.loadingMain">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
  const API = (typeof cliniflowAdminApiOrigin === 'function' ? cliniflowAdminApiOrigin() : 'https://cliniflow-backend-clean-production.up.railway.app');
  const DEFAULT_DISCOUNT_ERR = "Default discount percentages must be entered in Clinic Settings page";

  function t(key, params) {
    if (window.i18n && typeof window.i18n.t === "function") return window.i18n.t(key, params || {});
    return key;
  }

  function adminLocaleTag() {
    const L = window.i18n && typeof window.i18n.getLang === "function" ? window.i18n.getLang() : "en";
    if (L === "ka") return "ka-GE";
    if (L === "ru") return "ru-RU";
    if (L === "tr") return "tr-TR";
    return "en-US";
  }

  function refreshReferralFilterOptions() {
    const sel = document.getElementById("statusFilter");
    if (!sel || !window.i18n || typeof window.i18n.t !== "function") return;
    const prev = sel.value;
    const map = [
      ["", "referrals.filterAllStatuses"],
      ["registered", "referrals.filterRegisteredOpt"],
      ["treated", "referrals.filterTreatedOpt"],
      ["rewarded", "referrals.filterRewardedOpt"],
    ];
    map.forEach(([val, i18nKey], i) => {
      const opt = sel.options[i];
      if (opt) {
        opt.value = val;
        opt.textContent = window.i18n.t(i18nKey);
      }
    });
    if ([...sel.options].some((o) => o.value === prev)) sel.value = prev;
  }

  function token() {
    return (localStorage.getItem("adminToken") || localStorage.getItem("admin_token") || "").trim();
  }

  function headers() {
    const tok = token();
    return { Authorization: tok.startsWith("Bearer ") ? tok : `Bearer ${tok}`, "Content-Type": "application/json" };
  }

  function statusClass(s) {
    const v = String(s || "").toLowerCase();
    if (v === "treated")    return "badge-treated";
    if (v === "registered") return "badge-registered";
    if (v === "rewarded")   return "badge-rewarded";
    return "badge-invited";
  }

  function statusLabel(s) {
    const v = String(s || "").toLowerCase();
    if (v === "treated")    return t("referrals.statusShortTreated");
    if (v === "registered") return t("referrals.statusShortRegistered");
    if (v === "rewarded")   return t("referrals.statusShortRewarded");
    if (v === "approved")   return t("referrals.statusShortRegistered");
    return t("referrals.statusShortInvited");
  }

  function normalizeStatus(s) {
    const v = String(s || "").toLowerCase();
    if (["treated", "completed"].includes(v)) return "treated";
    if (["registered", "approved", "pending", "created"].includes(v)) return "registered";
    if (v === "rewarded") return "rewarded";
    return "invited";
  }

  /** Backend PENDING / INVITED / REGISTERED map to legacy "PENDING" — admin can still approve/reject. */
  function needsAdminApproval(item) {
    const s = String(item.status || "").toUpperCase();
    return s === "PENDING";
  }

  function formatReferralDate(createdAt) {
    if (createdAt == null || createdAt === "") return "—";
    const n = typeof createdAt === "number" ? createdAt : Date.parse(createdAt);
    if (Number.isNaN(n)) return "—";
    return new Date(n).toLocaleString(adminLocaleTag(), { dateStyle: "short", timeStyle: "short" });
  }

  async function patchReferralAction(id, action) {
    const path = action === "approve" ? "approve" : "reject";
    const r = await fetch(`${API}/api/admin/referrals/${encodeURIComponent(id)}/${path}`, {
      method: "PATCH",
      headers: headers(),
      body: "{}",
    });
    const json = await r.json().catch(() => ({}));
    if (!r.ok) {
      const rawErr = json.error;
      const msg =
        json.message ||
        (rawErr === DEFAULT_DISCOUNT_ERR ? t("referrals.discountErrorHint") : rawErr) ||
        r.statusText;
      throw new Error(String(msg || t("referrals.requestFailed")));
    }
    return json;
  }

  function renderPendingRows(items, pendingBody, sessionExpired) {
    if (sessionExpired) {
      pendingBody.innerHTML =
        '<tr class="loading-row"><td colspan="6" style="color:#f87171;">' + escHtml(t("referrals.sessionExpired")) + "</td></tr>";
      return;
    }
    const pending = items.filter(needsAdminApproval).filter((r) => r.id);
    document.getElementById("statPending").textContent = String(pending.length);
    if (pending.length === 0) {
      pendingBody.innerHTML =
        '<tr><td colspan="6"><div class="empty" style="padding:24px;"><div>' + escHtml(t("referrals.emptyPending")) + "</div></div></td></tr>";
      return;
    }
    pending.sort((a, b) => (Number(b.createdAt) || 0) - (Number(a.createdAt) || 0));
    pendingBody.innerHTML = pending
      .map((ref) => {
        const id = String(ref.id);
        const inviter = escHtml(ref.inviterPatientName || ref.inviterPatientId || "—");
        const invited = escHtml(ref.invitedPatientName || ref.invitedPatientId || "—");
        const code = ref.referralCode ? `<span class="pending-code">${escHtml(String(ref.referralCode))}</span>` : "—";
        const badge = escHtml(t("referrals.statusBadgePending"));
        const btnAp = escHtml(t("referrals.approve"));
        const btnRej = escHtml(t("referrals.reject"));
        return `<tr data-pending-row="${escHtml(id)}">
        <td>${inviter}</td>
        <td>${invited}</td>
        <td><span class="badge badge-registered">${badge}</span></td>
        <td>${code}</td>
        <td>${escHtml(formatReferralDate(ref.createdAt))}</td>
        <td class="actions-cell">
          <button type="button" class="btn-approve" data-ref-action="approve" data-ref-id="${escHtml(id)}">${btnAp}</button>
          <button type="button" class="btn-reject" data-ref-action="reject" data-ref-id="${escHtml(id)}">${btnRej}</button>
        </td>
      </tr>`;
      })
      .join("");
  }

  document.getElementById("pendingApprovalCard").addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-ref-action]");
    if (!btn || btn.disabled) return;
    const id = btn.getAttribute("data-ref-id");
    const action = btn.getAttribute("data-ref-action");
    if (!id || !action) return;
    const row = btn.closest("tr[data-pending-row]");
    const rowButtons = row ? row.querySelectorAll("button[data-ref-action]") : [];
    rowButtons.forEach((b) => {
      b.disabled = true;
    });
    try {
      await patchReferralAction(id, action);
      await load();
    } catch (err) {
      alert(String(err.message || err));
      rowButtons.forEach((b) => {
        b.disabled = false;
      });
    }
  });

  async function load() {
    const tbody = document.getElementById("tableBody");
    const pendingBody = document.getElementById("pendingBody");
    const lm = escHtml(t("referrals.loadingMain"));
    tbody.innerHTML = '<tr class="loading-row"><td colspan="5">' + lm + "</td></tr>";
    pendingBody.innerHTML = '<tr class="loading-row"><td colspan="6">' + lm + "</td></tr>";

    const statusFilter = document.getElementById("statusFilter").value.toLowerCase();

    let items = [];
    let sessionExpired = false;
    let apiJson = {};
    try {
      const r = await fetch(`${API}/api/admin/referrals`, { headers: headers(), cache: "no-store" });
      if (r.status === 401) {
        sessionExpired = true;
        tbody.innerHTML = '<tr class="loading-row"><td colspan="5" style="color:#f87171;">' + escHtml(t("referrals.sessionExpired")) + "</td></tr>";
        renderPendingRows([], pendingBody, true);
        document.getElementById("statPending").textContent = "—";
        const elUtc2 = document.getElementById("statInvitedUtcMonth");
        if (elUtc2) elUtc2.textContent = "—";
        return;
      }
      apiJson = await r.json();
      items = apiJson.items || [];
    } catch (e) {
      tbody.innerHTML = '<tr class="loading-row"><td colspan="5" style="color:#f87171;">' + escHtml(t("referrals.errorLoad", { message: e.message })) + "</td></tr>";
      pendingBody.innerHTML = '<tr class="loading-row"><td colspan="6" style="color:#f87171;">' + escHtml(t("referrals.errorLoad", { message: e.message })) + "</td></tr>";
      document.getElementById("statPending").textContent = "—";
      const elUtcErr = document.getElementById("statInvitedUtcMonth");
      if (elUtcErr) elUtcErr.textContent = "—";
      return;
    }

    const elUtc = document.getElementById("statInvitedUtcMonth");
    if (elUtc) {
      const utcVal = apiJson.referralInvitesThisUtcMonth;
      elUtc.textContent = utcVal != null && utcVal !== "" ? String(utcVal) : "—";
    }

    // Normalize statuses
    items = items.map((r) => ({ ...r, _status: normalizeStatus(r.status) }));
    renderPendingRows(items, pendingBody, false);

    // Filter by status if selected
    const filtered = statusFilter ? items.filter((r) => r._status === statusFilter) : items;

    // Group by referrer name
    const referrerMap = {};
    const unknown = t("referrals.unknownReferrer");
    for (const ref of filtered) {
      const key = ref.inviterPatientName || ref.inviterPatientId || unknown;
      if (!referrerMap[key]) referrerMap[key] = { name: key, items: [] };
      referrerMap[key].items.push(ref);
    }

    // Update stats (always from full items, not filtered)
    const allReferrers = new Set(items.map((r) => r.inviterPatientName || r.inviterPatientId || unknown));
    document.getElementById("statReferrers").textContent = String(allReferrers.size);
    document.getElementById("statInvited").textContent = String(items.length);
    document.getElementById("statRegistered").textContent = String(items.filter((r) => ["registered", "treated", "rewarded"].includes(r._status)).length);
    document.getElementById("statTreated").textContent = String(items.filter((r) => r._status === "treated").length);

    const rows = Object.values(referrerMap);
    if (rows.length === 0) {
      tbody.innerHTML =
        '<tr><td colspan="5"><div class="empty"><div class="empty-icon">📭</div><div>' +
        escHtml(t("referrals.emptyActivity")) +
        "</div></div></td></tr>";
      return;
    }

    // Sort by total invited descending
    rows.sort((a, b) => b.items.length - a.items.length);

    tbody.innerHTML = rows.map((row) => {
      const total = row.items.length;
      const registered = row.items.filter((r) => ["registered", "treated", "rewarded"].includes(r._status)).length;
      const treated = row.items.filter((r) => r._status === "treated").length;

      const registrationRate = total > 0 ? Math.round((registered / total) * 100) : 0;

      const invitedHtml = row.items.slice(0, 5).map((ref) => {
        const name = ref.invitedPatientName || "—";
        const short = name.length > 14 ? name.slice(0, 13) + "…" : name;
        const lbl = statusLabel(ref._status);
        return `<span class="badge ${statusClass(ref._status)}" title="${escHtml(name)}">
          ${escHtml(short)}
          <span style="opacity:.7;font-size:10px;">${escHtml(lbl)}</span>
        </span>`;
      }).join(" ");
      const moreN = row.items.length - 5;
      const moreCount =
        row.items.length > 5
          ? `<span style="color:#64748b;font-size:12px;">${escHtml(t("referrals.morePatients", { count: moreN }))}</span>`
          : "";

      const rateLine = escHtml(t("referrals.registrationRate", { percent: registrationRate }));

      return `<tr>
        <td>
          <div class="referrer-name">${escHtml(row.name)}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${registrationRate}%"></div></div>
          <div style="font-size:11px;color:#64748b;margin-top:3px;">${rateLine}</div>
        </td>
        <td class="count-cell count-invited">${total}</td>
        <td class="count-cell count-registered">${registered}</td>
        <td class="count-cell count-treated">${treated}</td>
        <td style="max-width:280px;">
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${invitedHtml}${moreCount}</div>
        </td>
      </tr>`;
    }).join("");
  }

  function escHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  window.rerenderReferralsAdmin = function () {
    refreshReferralFilterOptions();
    load();
  };
</script>
</body>
</html>
