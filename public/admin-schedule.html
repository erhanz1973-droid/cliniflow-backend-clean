<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <script src="/api-base.js?v=202603301"></script>
  <script src="/admin-i18n.js?v=21"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="calendar.documentTitle">Calendar - Clinifly Admin</title>
  <link rel="stylesheet" href="/admin-layout.css"/>
  <style>
    /* Calendar-specific overrides */
    .cal-page { padding: 24px; }

    label { display:block; font-size:12px; color:#475569; margin-bottom:4px; font-weight:600; }
    select {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); font-size: 13px; color: var(--text);
      cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--blue); }
    button {
      padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--text-2); transition: all .15s;
    }
    button:hover { background: var(--page-bg); }
    .muted { color: var(--text-m); font-size: 13px; }

    #calendar-container {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); min-height: 400px; overflow: auto;
      box-shadow: var(--shadow);
    }
    .calendar-grid { min-width:1160px; }
    .grid-head, .grid-row { display:grid; border-bottom:1px solid #f1f5f9; }
    .grid-head { position:sticky; top:0; background:#f8fafc; z-index:2; }
    .cell { padding:8px; min-height:36px; border-right:1px solid #f1f5f9; }
    .cell:last-child { border-right:none; }
    .head-cell { font-size:12px; color:#64748b; font-weight:700; text-transform:uppercase; }
    .head-day { display:flex; flex-direction:column; gap:3px; }
    .head-day strong { font-size:12px; color:#334155; }
    .head-day span { font-size:11px; color:#64748b; font-weight:600; }
    .time-cell { font-size:12px; color:#475569; background:#fcfdff; font-weight:600; }
    .slot-cell { padding:4px; }
    .view-tog { font-weight: 600; }
    .view-tog.is-active { background: var(--blue, #2563eb); color: #fff; border-color: var(--blue, #2563eb); }
    .cal-month-block { margin-bottom: 24px; }
    .cal-month-block + .cal-month-block { border-top: 1px solid var(--border); padding-top: 16px; }

    .appt-card {
      border: 1px solid var(--border); border-radius: 8px; padding: 6px;
      margin-bottom: 4px; background: var(--card); font-size: 12px;
      transition: box-shadow .15s;
    }
    .appt-card:hover { box-shadow: var(--shadow-md); }
    .appt-card:last-child { margin-bottom:0; }
    .appt-patient { font-weight:700; color:#0f172a; }
    .appt-meta { color:#64748b; margin-top:2px; }
    .status-badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:11px; font-weight:700; margin-top:4px; }
    .status-proposed  { background:#fef3c7; color:#92400e; }
    .status-confirmed { background:#dcfce7; color:#166534; }
    .status-other     { background:#e2e8f0; color:#334155; }
  </style>
</head>
<body>

  <div class="cal-page">

    <!-- Page Header -->
    <div class="page-hdr">
      <div class="page-hdr-left">
        <h1 class="pg-title" data-i18n="calendar.title">Appointments</h1>
        <p class="pg-sub" id="weekRange">—</p>
      </div>
      <div class="page-hdr-actions" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
        <div style="display:flex;gap:4px;flex-wrap:wrap;" id="viewModeToggles" role="group">
          <button type="button" class="view-tog is-active" id="viewModeWeekBtn" data-i18n="calendar.week"></button>
          <button type="button" class="view-tog" id="viewModeMonthBtn" data-i18n="calendar.month"></button>
        </div>
        <button type="button" id="prevWeekBtn" data-i18n="calendar.prev">←</button>
        <button type="button" id="todayBtn" data-i18n="calendar.today"></button>
        <button type="button" id="nextWeekBtn" data-i18n="calendar.next">→</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-body" style="padding:12px 18px;">
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <label for="doctorSelect" style="margin:0;white-space:nowrap;" data-i18n="calendar.doctor">Doctor</label>
            <select id="doctorSelect" style="min-width:180px;">
              <option value="" data-i18n="calendar.allDoctors">All doctors</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <label for="chairSelect" style="margin:0;white-space:nowrap;" data-i18n="calendar.chair">Chair</label>
            <select id="chairSelect" style="min-width:140px;">
              <option value="" data-i18n="calendar.allChairs">All chairs</option>
            </select>
          </div>
          <span class="muted" id="summaryText" style="margin-left:auto;"></span>
        </div>
      </div>
    </div>

    <div id="calendar-container">
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
  </div>

  <script>
    const prevWeekBtn = document.getElementById('prevWeekBtn');
    const nextWeekBtn = document.getElementById('nextWeekBtn');
    const todayBtn = document.getElementById('todayBtn');
    const viewModeWeekBtn = document.getElementById('viewModeWeekBtn');
    const viewModeMonthBtn = document.getElementById('viewModeMonthBtn');
    const doctorSelect = document.getElementById('doctorSelect');
    const chairSelect = document.getElementById('chairSelect');
    const weekRangeEl = document.getElementById('weekRange');
    const summaryText = document.getElementById('summaryText');
    const gridEl = document.getElementById('calendarGrid');

    const localeMap = { en: 'en-US', tr: 'tr-TR', ru: 'ru-RU', ka: 'ka-GE' };
    function currentLanguage() {
      return (window.i18n && typeof i18n.getLang === 'function') ? i18n.getLang() : 'tr';
    }
    function getCalLocale() {
      return localeMap[currentLanguage()] || 'en-US';
    }
    function t(key, params) {
      if (window.i18n && typeof i18n.t === 'function') return i18n.t(key, params || {});
      return key;
    }

    const WEEKDAY_MAP = {
      en: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
      tr: ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'],
      ru: ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'],
      ka: ['კვირა', 'ორშაბათი', 'სამშაბათი', 'ოთხშაბათი', 'ხუთშაბათი', 'პარასკევი', 'შაბათი'],
    };
    const MONTH_MAP = {
      en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
      tr: ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'],
      ru: ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'],
      ka: ['იანვარი', 'თებერვალი', 'მარტი', 'აპრილი', 'მაისი', 'ივნისი', 'ივლისი', 'აგვისტო', 'სექტემბერი', 'ოქტომბერი', 'ნოემბერი', 'დეკემბერი'],
    };

    // Date.getDay(): 0 = Sunday … 6 = Saturday. Do not subtract 1 from getDay().
    // Week columns: Sun → Sat (Sunday in range: weekStart + 0 .. +6).
    const SLOT_MINUTES = 10;
    const START_HOUR = 8;
    const END_HOUR = 20;
    const SLOT_START_MINUTES = START_HOUR * 60;
    const SLOT_LAST_MINUTES = END_HOUR * 60;

    const PROCEDURE_RECOMMENDED_MINUTES = {
      TREATMENT: 30,
      CONSULT: 30,
      FOLLOWUP: 20,
      LAB: 30,
      CROWN: 60,
      CROWN_ZIRCONIA: 60,
      CROWN_EMAX: 60,
      CROWN_PFM: 60,
      CROWN_METAL: 60,
      CROWN_TEMPORARY: 45,
      TEMP_CROWN: 45,
      BRIDGE_UNIT: 75,
      TEMP_BRIDGE_UNIT: 60,
      INLAY: 60,
      ONLAY: 60,
      OVERLAY: 60,
      POST_AND_CORE: 60,
      ROOT_CANAL_TREATMENT: 90,
      ROOT_CANAL_RETREATMENT: 100,
      CANAL_OPENING: 40,
      CANAL_FILLING: 40,
      IMPLANT: 90,
      IMPLANT_CROWN: 60,
      EXTRACTION: 30,
      SURGICAL_EXTRACTION: 60,
      FILLING: 30,
      TEMP_FILLING: 20,
    };

    let weekStart = getStartOfWeek(new Date());
    let viewMode = 'week';
    let monthY = new Date().getFullYear();
    let monthM = new Date().getMonth();
    let allAppointments = [];
    let treatmentTimingMap = {};
    let configuredChairCount = 3;
    let activeLoadRequestId = 0;

    function getWeekStartsInMonth(y, m) {
      const first = new Date(y, m, 1);
      const lastDay = new Date(y, m + 1, 0);
      const endWeekStart = getStartOfWeek(lastDay);
      const out = [];
      for (let d = getStartOfWeek(first); d <= endWeekStart; d = addDays(d, 7)) {
        out.push(new Date(d));
      }
      return out;
    }

    function getWeekRangeLabel(lang) {
      const L = lang !== undefined ? lang : currentLanguage();
      if (viewMode === 'month') return formatMonthTitle(monthY, monthM, L);
      return formatWeekRange(weekStart, L);
    }

    function setViewToggles() {
      if (viewModeWeekBtn && viewModeMonthBtn) {
        viewModeWeekBtn.classList.toggle('is-active', viewMode === 'week');
        viewModeMonthBtn.classList.toggle('is-active', viewMode === 'month');
      }
    }

    function getToken() {
      const direct = localStorage.getItem('adminToken') || localStorage.getItem('admin_token') || localStorage.getItem('token') || '';
      const cleanedDirect = String(direct || '').trim();
      if (cleanedDirect && cleanedDirect !== 'undefined' && cleanedDirect !== 'null') return cleanedDirect;

      try {
        const rawUser = localStorage.getItem('user');
        if (!rawUser) return '';
        const parsed = JSON.parse(rawUser);
        const candidate = String(parsed?.token || parsed?.adminToken || parsed?.accessToken || '').trim();
        if (!candidate || candidate === 'undefined' || candidate === 'null') return '';
        return candidate;
      } catch (_) {
        return '';
      }
    }

    /** Tek giriş noktası: ISO / tarih+süre / sayısal ms / Date */
    function safeDate(input) {
      if (input == null || input === "") return null;
      if (input instanceof Date) return Number.isNaN(input.getTime()) ? null : input;
      if (typeof input === "number" && Number.isFinite(input)) {
        const d = new Date(input);
        return Number.isNaN(d.getTime()) ? null : d;
      }
      let s = String(input).trim();
      if (!s) return null;
      if (!s.includes("T")) s = s.replace(/\s+/g, "T");
      const d = new Date(s);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    /** Randevu / timeline satırından başlangıç ham değeri (öncelik sırası). */
    function calendarItemStartRaw(rawItem) {
      if (!rawItem || typeof rawItem !== "object") return null;
      const chain = [
        rawItem.startAt,
        rawItem.start_at,
        rawItem.timelineAt,
        rawItem.timeline_at,
        rawItem.timestamp,
        rawItem.appointment_date,
        rawItem.appointmentDate,
        rawItem.created_at,
        rawItem.createdAt,
      ];
      for (const c of chain) {
        if (c != null && String(c).trim() !== "") return c;
      }
      const dd = rawItem.date && String(rawItem.date).trim();
      if (dd && /^\d{4}-\d{2}-\d{2}$/.test(dd)) {
        const tm = rawItem.time != null ? String(rawItem.time).trim() : "";
        if (/^\d{2}:\d{2}:\d{2}$/.test(tm)) return `${dd}T${tm}`;
        if (/^\d{2}:\d{2}$/.test(tm)) return `${dd}T${tm}:00`;
        return `${dd}T00:00:00`;
      }
      return null;
    }

    function toDateOnly(value) {
      const d = safeDate(value);
      if (!d) return '';
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function addDays(dateObj, days) {
      const d = new Date(dateObj);
      d.setDate(d.getDate() + days);
      return d;
    }

    /** Start of local week: Sunday 00:00 (getDay() === 0). */
    function getStartOfWeek(value) {
      const d = new Date(value);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay());
      return d;
    }

    /** Monday-first column index 0..6: Mon=0 … Sun=6. Use when converting getDay() to ISO-style week UI. */
    function mondayFirstColumnIndex(dateObj) {
      const day = new Date(dateObj).getDay();
      return (day + 6) % 7;
    }

    function buildWeekDays(startDate) {
      return Array.from({ length: 7 }, (_, idx) => addDays(startDate, idx));
    }

    function formatMonthTitle(year, month, lang) {
      const d = new Date(year, month);
      const M = MONTH_MAP[lang] || MONTH_MAP.en;
      return `${M[d.getMonth()]} ${d.getFullYear()}`;
    }

    function formatWeekRange(ws, lang) {
      const M = MONTH_MAP[lang] || MONTH_MAP.en;
      const start = new Date(ws);
      const end = new Date(ws);
      end.setDate(end.getDate() + 6);
      return `${M[start.getMonth()]} ${start.getDate()} - ${M[end.getMonth()]} ${end.getDate()}`;
    }

    function fmtTime(startAt, endAt, lang) {
      const L = lang !== undefined ? lang : currentLanguage();
      const loc = localeMap[L] || 'en-US';
      const s = safeDate(startAt);
      const e = safeDate(endAt);
      if (!s) return '-';
      const sText = s.toLocaleTimeString(loc, { hour: '2-digit', minute: '2-digit' });
      if (!e || Number.isNaN(e.getTime())) return sText;
      const eText = e.toLocaleTimeString(loc, { hour: '2-digit', minute: '2-digit' });
      return `${sText} - ${eText}`;
    }

    function statusClass(status) {
      const s = String(status || '').toUpperCase();
      if (s === 'PROPOSED') return 'status-proposed';
      if (s === 'CONFIRMED') return 'status-confirmed';
      return 'status-other';
    }

    function makeSlots() {
      const out = [];
      for (let hour = START_HOUR; hour <= END_HOUR; hour += 1) {
        for (let min = 0; min < 60; min += SLOT_MINUTES) {
          if (hour === END_HOUR && min > 0) continue;
          out.push(`${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`);
        }
      }
      return out;
    }

    const CACHED_SLOTS = makeSlots();

    function minuteOfDay(dateObj) {
      return dateObj.getHours() * 60 + dateObj.getMinutes();
    }

    function slotIndexFromDate(dateObj, slots) {
      const minutes = minuteOfDay(dateObj);
      if (minutes < SLOT_START_MINUTES || minutes > SLOT_LAST_MINUTES) return -1;
      if ((minutes - SLOT_START_MINUTES) % SLOT_MINUTES !== 0) return -1;
      const idx = Math.floor((minutes - SLOT_START_MINUTES) / SLOT_MINUTES);
      return idx >= 0 && idx < slots.length ? idx : -1;
    }

    function slotIndexFromDateFloor(dateObj, slots) {
      const minutes = minuteOfDay(dateObj);
      if (minutes < SLOT_START_MINUTES) return -1;
      if (minutes >= SLOT_LAST_MINUTES) return slots.length - 1;
      const idx = Math.floor((minutes - SLOT_START_MINUTES) / SLOT_MINUTES);
      return idx >= 0 && idx < slots.length ? idx : -1;
    }

    function parseMinuteValue(value, fallback = 0) {
      const parsed = Number.parseInt(value, 10);
      if (!Number.isFinite(parsed)) return fallback;
      return Math.max(0, Math.min(720, parsed));
    }

    function normalizeTreatmentKey(value) {
      const raw = String(value || '').trim().toUpperCase();
      if (!raw) return '';
      return raw.replace(/[^A-Z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    }

    function getTimingFromMap(treatment) {
      const normalized = normalizeTreatmentKey(treatment);
      const direct = treatmentTimingMap[normalized] || treatmentTimingMap[String(treatment || '').trim().toUpperCase()];
      if (direct) {
        const d = parseMinuteValue(direct?.duration_minutes, 0);
        const b = parseMinuteValue(direct?.break_minutes, 0);
        if (d > 0 || b > 0) return direct;
      }

      const prefixedKey = Object.keys(treatmentTimingMap).find((key) => {
        if (!(key === normalized || key.startsWith(`${normalized}_`) || normalized.startsWith(`${key}_`))) return false;
        const candidate = treatmentTimingMap[key];
        return parseMinuteValue(candidate?.duration_minutes, 0) > 0 || parseMinuteValue(candidate?.break_minutes, 0) > 0;
      });
      if (prefixedKey) return treatmentTimingMap[prefixedKey];

      const recommendedKey = Object.keys(PROCEDURE_RECOMMENDED_MINUTES).find((key) => {
        if (!(key === normalized || key.startsWith(`${normalized}_`) || normalized.startsWith(`${key}_`))) return false;
        return Number.isFinite(PROCEDURE_RECOMMENDED_MINUTES[key]) && PROCEDURE_RECOMMENDED_MINUTES[key] > 0;
      });
      if (recommendedKey) {
        return {
          duration_minutes: PROCEDURE_RECOMMENDED_MINUTES[recommendedKey],
          break_minutes: 0,
        };
      }

      return direct || { duration_minutes: 10, break_minutes: 0 };
    }

    function getItemOccupiedMinutes(item) {
      const fromItemDuration = parseMinuteValue(
        item?.duration_minutes ?? item?.durationMinutes ?? item?.duration ?? item?.estimated_duration_minutes ?? item?.estimatedDurationMinutes,
        0
      );
      const fromItemBreak = parseMinuteValue(
        item?.break_minutes ?? item?.breakMinutes ?? item?.rest_minutes ?? item?.break_duration,
        0
      );
      if (fromItemDuration > 0 || fromItemBreak > 0) {
        return Math.max(SLOT_MINUTES, fromItemDuration + fromItemBreak);
      }

      const treatmentKey = normalizeTreatmentKey(item?.treatment || item?.type || item?.eventType || item?.procedure_code || '');
      if (treatmentKey) {
        const mapped = getTimingFromMap(treatmentKey);
        const mappedTotal = parseMinuteValue(mapped?.duration_minutes, 0) + parseMinuteValue(mapped?.break_minutes, 0);
        if (mappedTotal > 0) return Math.max(SLOT_MINUTES, mappedTotal);
      }

      const start = safeDate(item.startAt);
      const end = safeDate(item.endAt);
      if (start && end && Number.isFinite(start.getTime()) && Number.isFinite(end.getTime()) && end > start) {
        const diffMin = Math.ceil((end.getTime() - start.getTime()) / (60 * 1000));
        return Math.max(SLOT_MINUTES, diffMin);
      }

      return 10;
    }

    function renderDoctors(items) {
      const loc = getCalLocale();
      const collator = (a, b) => String(a).localeCompare(String(b), loc);
      const doctors = [...new Set(items.map((i) => i.doctor).filter(Boolean))].sort(collator);
      const current = doctorSelect.value;
      doctorSelect.innerHTML = '';
      const opt0 = document.createElement('option');
      opt0.value = '';
      opt0.textContent = t('calendar.allDoctors');
      doctorSelect.appendChild(opt0);
      doctors.forEach((doctorName) => {
        const opt = document.createElement('option');
        opt.value = String(doctorName);
        opt.textContent = String(doctorName);
        doctorSelect.appendChild(opt);
      });
      if (doctors.includes(current)) doctorSelect.value = current;
    }

    function normalizeChairText(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const prefixed = raw.match(/^chair\s*(\d+)$/i);
      if (prefixed) return String(Number(prefixed[1]));
      if (/^\d+$/.test(raw)) return String(Number(raw));
      return raw.toUpperCase();
    }

    function renderChairs(items) {
      const fromData = [...new Set((items || []).map((i) => normalizeChairText(i?.chair)).filter(Boolean))];
      const fromConfig = Array.from({ length: Math.max(1, Math.min(50, Number(configuredChairCount) || 3)) }, (_, idx) => String(idx + 1));
      const loc = getCalLocale();
      const chairs = [...new Set([...fromConfig, ...fromData])]
        .sort((a, b) => String(a).localeCompare(String(b), loc));
      const current = String(chairSelect?.value || '');
      if (!chairSelect) return;

      chairSelect.innerHTML = '';
      const c0 = document.createElement('option');
      c0.value = '';
      c0.textContent = t('calendar.allChairs');
      chairSelect.appendChild(c0);
      chairs.forEach((chairName) => {
        const opt = document.createElement('option');
        opt.value = String(chairName);
        opt.textContent = /^\d+$/.test(String(chairName)) ? t('calendar.chairWithNumber', { n: chairName }) : String(chairName);
        chairSelect.appendChild(opt);
      });

      if (chairs.includes(current)) chairSelect.value = current;
    }

    async function loadChairCountFromClinic() {
      const token = getToken();
      if (!token) return;

      try {
        const response = await fetch((typeof apiUrl === 'function' ? apiUrl('/api/admin/clinic') : '/api/admin/clinic'), {
          headers: {
            Accept: 'application/json',
            Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
          },
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data?.ok) return;

        const raw =
          data?.chairCount ??
          data?.chair_count ??
          data?.clinic?.chairCount ??
          data?.clinic?.chair_count ??
          data?.settings?.chairCount ??
          data?.settings?.chair_count ??
          data?.clinic?.settings?.chairCount ??
          data?.clinic?.settings?.chair_count;

        const parsed = Number.parseInt(String(raw ?? ''), 10);
        if (Number.isFinite(parsed) && parsed > 0) {
          configuredChairCount = Math.max(1, Math.min(50, parsed));
        }
      } catch (e) {
      }
    }

    function normalizeDoctorName(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      return raw
        .toLocaleLowerCase('tr')
        .replace(/\b(dr|dr\.)\b/g, '')
        .replace(/[^\p{L}\p{N}\s]/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    /** API'deki "Burhan" ile randevuda yazılan "Burhan abi" gibi takma adlı kayıtları aynı doktora bağla. */
    function doctorNormMatches(filterNorm, itemNorm) {
      const f = String(filterNorm || '').trim();
      const n = String(itemNorm || '').trim();
      if (!f || !n) return false;
      if (f === n) return true;
      if (n.startsWith(f + ' ')) return true;
      if (f.startsWith(n + ' ')) return true;
      const tf = f.split(/\s+/).filter(Boolean)[0] || '';
      const tn = n.split(/\s+/).filter(Boolean)[0] || '';
      if (tf && tn && tf === tn) return true;
      return false;
    }

    function normalizeToothLabel(rawItem) {
      if (!rawItem || typeof rawItem !== 'object') return '';
      const v =
        rawItem.tooth_number ??
        rawItem.toothNumber ??
        rawItem.tooth_fdi_code ??
        rawItem.fdiTooth ??
        rawItem.fdi_tooth ??
        rawItem.tooth ??
        rawItem.toothId ??
        rawItem.tooth_id ??
        rawItem.toothID;
      if (v == null || v === '') return '';
      const s = String(v).trim();
      const digits = s.replace(/\D/g, '');
      const n = digits.length >= 2 ? Number.parseInt(digits.slice(0, 2), 10) : NaN;
      if (Number.isFinite(n) && n >= 11 && n <= 48) return String(n);
      return s;
    }

    function normalizeIncomingAppointment(rawItem) {
      const raw = calendarItemStartRaw(rawItem);
      const start = safeDate(raw);
      if (!start) {
        console.warn("INVALID EVENT DATE:", raw, rawItem);
        return null;
      }
      const endRaw = rawItem?.endAt || rawItem?.end_at || null;
      const end = safeDate(endRaw);

      const doctor = String(rawItem?.doctor || rawItem?.doctor_name || rawItem?.doctorName || rawItem?.doctor_id || rawItem?.doctorId || '').trim();
      const patient = String(rawItem?.patient || rawItem?.patient_name || rawItem?.patientName || rawItem?.patient_id || rawItem?.patientId || '').trim();
      const chair = String(rawItem?.chair || rawItem?.chair_name || rawItem?.chairName || rawItem?.chair_no || rawItem?.chairNo || rawItem?.chair_id || rawItem?.chairId || '').trim();
      const treatment = String(rawItem?.treatment || rawItem?.procedure || rawItem?.procedure_code || rawItem?.procedure_name || rawItem?.eventType || rawItem?.type || '').trim();
      const type = String(rawItem?.type || rawItem?.eventType || rawItem?.procedure_code || '').trim();
      const eventType = String(rawItem?.eventType || rawItem?.type || '').trim();
      const tooth = normalizeToothLabel(rawItem);
      const id = rawItem?.id != null ? String(rawItem.id) : '';

      return {
        id,
        doctor,
        patient,
        chair,
        tooth,
        startAt: start.toISOString(),
        endAt: end && !Number.isNaN(end.getTime()) ? end.toISOString() : null,
        _startDate: start,
        status: String(rawItem?.status || 'PROPOSED').toUpperCase(),
        treatment,
        type,
        eventType,
        duration_minutes: parseMinuteValue(rawItem?.duration_minutes ?? rawItem?.durationMinutes ?? rawItem?.duration ?? rawItem?.estimated_duration_minutes ?? rawItem?.estimatedDurationMinutes, 0),
        break_minutes: parseMinuteValue(rawItem?.break_minutes ?? rawItem?.breakMinutes ?? rawItem?.rest_minutes ?? rawItem?.break_duration, 0),
        _doctorNorm: normalizeDoctorName(doctor),
        _chairNorm: normalizeChairText(chair),
        _source: rawItem?._source || 'appointments',
      };
    }

    async function loadDoctorsFromApi() {
      const token = getToken();
      if (!token) return;

      try {
        const response = await fetch((typeof apiUrl === 'function' ? apiUrl('/api/admin/doctors') : '/api/admin/doctors'), {
          headers: {
            Accept: 'application/json',
            Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
          },
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) return;

        const apiDoctors =
          Array.isArray(data)
            ? data
            : Array.isArray(data?.doctors)
              ? data.doctors
              : Array.isArray(data?.items)
                ? data.items
                : Array.isArray(data?.data)
                  ? data.data
                  : [];

        const names = apiDoctors
          .map((doc) => doc?.name || doc?.full_name || doc?.email || '')
          .filter(Boolean)
          .map((v) => String(v));

        const loc = getCalLocale();
        const unique = [...new Set(names)].sort((a, b) => a.localeCompare(b, loc));
        const current = doctorSelect.value;

        const o0 = document.createElement('option');
        o0.value = '';
        o0.textContent = t('calendar.allDoctors');

        unique.forEach((name) => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          doctorSelect.appendChild(opt);
        });
        if (unique.includes(current)) doctorSelect.value = current;
      } catch (e) {
      }
    }

    async function loadTreatmentTimings() {
      const token = getToken();
      if (!token) return;

      try {
        const response = await fetch((typeof apiUrl === 'function' ? apiUrl('/api/admin/treatment-prices') : '/api/admin/treatment-prices'), {
          headers: {
            Accept: 'application/json',
            Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
          },
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data?.ok) return;

        const rows = Array.isArray(data?.prices) ? data.prices : [];
        const nextMap = {};
        rows.forEach((row) => {
          const value = {
            duration_minutes: parseMinuteValue(row?.duration_minutes, 0),
            break_minutes: parseMinuteValue(row?.break_minutes, 0),
          };

          const rawKeys = [
            row?.treatment_name,
            row?.procedure_code,
            row?.procedure,
            row?.code,
            row?.name,
          ];

          rawKeys.forEach((rawKey) => {
            const normalizedKey = normalizeTreatmentKey(rawKey);
            if (normalizedKey) nextMap[normalizedKey] = value;

            const plainUpper = String(rawKey || '').trim().toUpperCase();
            if (plainUpper) nextMap[plainUpper] = value;
          });
        });

        treatmentTimingMap = nextMap;
      } catch (e) {
      }
    }

    function buildOneWeekGrid(weekRef, filtered, doctorFilter, lang) {
      const weekDays = buildWeekDays(weekRef);
      const weekDayKeys = weekDays.map((d) => toDateOnly(d));
      const dayIndexByDate = {};
      weekDayKeys.forEach((key, idx) => {
        dayIndexByDate[key] = idx;
      });
      const slots = CACHED_SLOTS;
      const weekFiltered = filtered.filter((item) => {
        const k = toDateOnly(item.startAt);
        return dayIndexByDate[k] !== undefined;
      });
      const columnsStyle = '130px repeat(7, minmax(150px, 1fr))';
      const map = {};
      const timeHead = t('calendar.timeColumn');

      weekFiltered.forEach((item) => {
        const start = safeDate(item.startAt);
        if (!start || Number.isNaN(start.getTime())) return;
        const exactIdx = slotIndexFromDate(start, slots);
        const slotIdx = exactIdx >= 0 ? exactIdx : slotIndexFromDateFloor(start, slots);
        if (slotIdx < 0) return;
        const dayKey = toDateOnly(start);
        const dayIdx = dayIndexByDate[dayKey];
        if (dayIdx === undefined) return;

        const occupiedMinutes = getItemOccupiedMinutes(item);
        const spanSlots = Math.max(1, Math.ceil(occupiedMinutes / SLOT_MINUTES));

        for (let offset = 0; offset < spanSlots; offset += 1) {
          const rowIdx = slotIdx + offset;
          if (rowIdx >= slots.length) break;
          const key = `${rowIdx}|${dayIdx}`;
          if (!map[key]) map[key] = [];
          map[key].push({ item, isStart: offset === 0 });
        }
      });

      const Wmap = WEEKDAY_MAP[lang] || WEEKDAY_MAP.en;
      const Mmap = MONTH_MAP[lang] || MONTH_MAP.en;
      const headCells = weekDays.map((day) => {
        const d = new Date(day);
        const w = Wmap[d.getDay()];
        const sub = `${Mmap[d.getMonth()]} ${d.getDate()}`;
        return `<div class="cell head-cell"><div class="head-day"><strong>${w}</strong><span>${sub}</span></div></div>`;
      });
      const headHtml = `<div class="grid-head" style="grid-template-columns:${columnsStyle}"><div class="cell head-cell">${timeHead}</div>${headCells.join('')}</div>`;
      let rowsHtml = '';

      slots.forEach((slotLabel, slotIdx) => {
        let html = `<div class="grid-row" style="grid-template-columns:${columnsStyle}"><div class="cell time-cell">${slotLabel}</div>`;
        for (let dayIdx = 0; dayIdx < 7; dayIdx += 1) {
          const key = `${slotIdx}|${dayIdx}`;
          const cards = (map[key] || []).map((entry) => {
            const item = entry.item;
            if (!entry.isStart) {
              return `<div class="appt-card" style="opacity:0.35;border-style:dashed;">&nbsp;</div>`;
            }
            return `
            <div class="appt-card">
              <div class="appt-patient">${item.patient || '-'}</div>
              <div class="appt-meta">${doctorFilter ? '' : `${item.doctor || '-'} • `}${item.tooth ? `🦷 ${item.tooth} • ` : ''}${normalizeChairText(item.chair) || '-'} • ${fmtTime(item.startAt, item.endAt, lang)}${item.treatment ? ` • ${item.treatment}` : ''}</div>
              <div><span class="status-badge ${statusClass(item.status)}">${item.status || 'UNKNOWN'}</span></div>
            </div>
          `;
          }).join('');
          html += `<div class="cell slot-cell">${cards}</div>`;
        }
        html += '</div>';
        rowsHtml += html;
      });

      return headHtml + rowsHtml;
    }

    function renderGrid(items, lang) {
      document.getElementById('calendarGrid').innerHTML = '';
      console.log('LANG USED IN GRID:', lang);
      const doctorFilter = doctorSelect.value;
      const chairFilter = chairSelect ? String(chairSelect.value || '') : '';
      const normalizedDoctorFilter = normalizeDoctorName(doctorFilter);
      const normalizedChairFilter = normalizeChairText(chairFilter);

      const byDoctor = normalizedDoctorFilter
        ? items.filter((i) => {
            const itemNorm = i?._doctorNorm || normalizeDoctorName(i?.doctor);
            return doctorNormMatches(normalizedDoctorFilter, itemNorm);
          })
        : items;
      const filtered = normalizedChairFilter
        ? byDoctor.filter((i) => (i?._chairNorm || normalizeChairText(i?.chair)) === normalizedChairFilter)
        : byDoctor;

      const weekBlocks = viewMode === 'week'
        ? [weekStart]
        : getWeekStartsInMonth(monthY, monthM);

      const gridParts = weekBlocks.map((ws) => {
        if (viewMode === 'month') {
          const label = formatWeekRange(ws, lang);
          return `<div class="cal-month-block"><div class="muted" style="padding:0 0 8px;font-weight:600;">${label}</div>${buildOneWeekGrid(ws, filtered, doctorFilter, lang)}</div>`;
        }
        return buildOneWeekGrid(ws, filtered, doctorFilter, lang);
      });
      const emptyKey = viewMode === 'week' ? 'calendar.noAppointmentsForWeek' : 'calendar.noAppointmentsForRange';
      const emptyHtml = !filtered.length
        ? `<div class="muted" style="padding:10px;">${t('calendar.noEvents')}. ${t(emptyKey)}</div>`
        : '';
      gridEl.innerHTML = gridParts.join('') + emptyHtml;

      const doctorCount = [...new Set(filtered.map((i) => String(i.doctor || '')).filter(Boolean))].length;
      const chairCount = [...new Set(filtered.map((i) => i?._chairNorm || normalizeChairText(i.chair)).filter(Boolean))].length;
      summaryText.textContent = t('calendar.summaryLine', { count: filtered.length, doctorCount, chairCount });
      console.log('FULL TEXT:', document.body.innerText);
      if (lang !== 'en' && document.body.innerText.match(/Monday|Tuesday|January/)) {
        throw new Error('❌ English leakage detected');
      }
    }

    async function fetchDayAppointments(date) {
      const token = getToken();
      const response = await fetch((typeof apiUrl === 'function' ? apiUrl(`/api/admin/appointments?date=${encodeURIComponent(date)}`) : `/api/admin/appointments?date=${encodeURIComponent(date)}`), {
        headers: {
          Accept: 'application/json',
          Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
        },
      });
      if (response.status === 404) return [];
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        return [];
      }
      return Array.isArray(data.appointments) ? data.appointments : [];
    }

    async function fetchRangeAppointments(startDate, endDate) {
      const token = getToken();
      const response = await fetch((typeof apiUrl === 'function' ? apiUrl(`/api/admin/appointments?startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`) : `/api/admin/appointments?startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`), {
        headers: {
          Accept: 'application/json',
          Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
        },
      });
      if (response.status === 404) return [];
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error('range_fetch_failed');
      }
      return Array.isArray(data.appointments) ? data.appointments : [];
    }

    function daySetFromRange(startDate, endDate) {
      const out = new Set();
      let d = new Date(`${startDate}T12:00:00`);
      for (;;) {
        const k = toDateOnly(d);
        if (k > endDate) break;
        out.add(k);
        if (k === endDate) break;
        d = addDays(d, 1);
      }
      return out;
    }

    async function fetchRangeTimelineEvents(startDate, endDate) {
      const token = getToken();
      const response = await fetch((typeof apiUrl === 'function' ? apiUrl(`/api/admin/events?startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`) : `/api/admin/events?startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`), {
        headers: {
          Accept: 'application/json',
          Authorization: token.startsWith('Bearer ') ? token : `Bearer ${token}`,
        },
      });

      if (response.status === 401) {
        throw new Error('unauthorized');
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) return [];

      const all = [];
      if (Array.isArray(data.overdue)) all.push(...data.overdue);
      if (Array.isArray(data.today)) all.push(...data.today);
      if (Array.isArray(data.upcoming)) all.push(...data.upcoming);

      const daySet = daySetFromRange(startDate, endDate);

      let invalidTl = 0;
      const toAppointmentLike = (evt) => {
        const raw = calendarItemStartRaw(evt);
        const start = safeDate(raw);
        if (!start) {
          invalidTl++;
          console.warn("INVALID EVENT DATE (timeline→calendar):", raw, evt);
          return null;
        }
        const startAt = start.toISOString();
        const dateKey = toDateOnly(start);
        if (!daySet.has(dateKey)) return null;

        return {
          id: evt?.id != null ? String(evt.id) : '',
          doctor: String(evt?.doctor || evt?.doctorName || ''),
          patient: String(evt?.patientName || evt?.patient || evt?.patientId || ''),
          chair: String(evt?.chair || evt?.chairName || ''),
          tooth: normalizeToothLabel(evt),
          startAt,
          _startDate: start,
          endAt: evt?.endAt || evt?.end_at || null,
          status: String(evt?.status || 'PROPOSED').toUpperCase(),
          treatment: String(evt?.eventType || evt?.treatment || evt?.procedure || evt?.type || ''),
          duration_minutes: Number.parseInt(evt?.duration_minutes ?? evt?.duration ?? 0, 10) || 0,
          break_minutes: Number.parseInt(evt?.break_minutes ?? evt?.rest_minutes ?? 0, 10) || 0,
          _source: 'timeline',
          _doctorNorm: normalizeDoctorName(String(evt?.doctor || evt?.doctorName || '')),
          _chairNorm: normalizeChairText(String(evt?.chair || evt?.chairName || '')),
        };
      };

      const mapped = all.map(toAppointmentLike).filter(Boolean);
      console.log("[calendar /api/admin/events] RAW LENGTH:", all.length);
      console.log("[calendar /api/admin/events] EVENTS LENGTH:", mapped.length);
      console.log("[calendar /api/admin/events] INVALID COUNT:", invalidTl);
      mapped.__adminEventsRawTotal = all.length;
      mapped.__adminEventsInvalidTl = invalidTl;

      return mapped;
    }

    async function fetchAppointmentsForRange(startDate, endDate) {
      return fetchRangeAppointments(startDate, endDate);
    }

    /**
     * Aynı slot + hasta + doktor + sandalye altında birden fazla işlem vardı; eski Map birleştirmesi tek karta düşürüyordu.
     * Artık sadece tam aynı fingerprint tekrarlarını atıyoruz (gerçek kopya).
     */
    function mergeUniqueAppointments(base, extras) {
      const out = [...(base || []), ...(extras || [])];
      const seen = new Set();
      const deduped = [];
      for (const item of out) {
        const fp = [
          item?.startAt || '',
          item?.patient || '',
          item?.doctor || '',
          item?.chair || '',
          item?.treatment || '',
          item?.tooth || '',
          item?.type || '',
          item?.eventType || '',
          item?.status || '',
          item?._source || '',
          item?.id || '',
        ].join('\x1e');
        if (seen.has(fp)) continue;
        seen.add(fp);
        deduped.push(item);
      }
      return deduped;
    }

    function applyScheduleStaticI18n(optionalLang) {
      setViewToggles();
      if (weekRangeEl) weekRangeEl.textContent = getWeekRangeLabel(optionalLang !== undefined ? optionalLang : currentLanguage());
    }

    async function loadAppointments() {
      const requestId = ++activeLoadRequestId;
      const token = getToken();
      if (!token) {
        gridEl.innerHTML = `<div class="muted" style="padding:10px;">${t('calendar.tokenMissing')}</div>`;
        return;
      }

      const lang = currentLanguage();
      let rangeStart;
      let rangeEnd;
      if (viewMode === 'week') {
        const wd = buildWeekDays(weekStart);
        rangeStart = toDateOnly(wd[0]);
        rangeEnd = toDateOnly(wd[6]);
        weekRangeEl.textContent = formatWeekRange(weekStart, lang);
      } else {
        const weeksM = getWeekStartsInMonth(monthY, monthM);
        rangeStart = toDateOnly(weeksM[0]);
        rangeEnd = toDateOnly(addDays(weeksM[weeksM.length - 1], 6));
        weekRangeEl.textContent = formatMonthTitle(monthY, monthM, lang);
      }

      setViewToggles();
      gridEl.innerHTML = `<div class="muted" style="padding:10px;">${t('calendar.loading')}</div>`;

      try {
        let weeklyAppointments = [];
        try {
          weeklyAppointments = await fetchAppointmentsForRange(rangeStart, rangeEnd);
        } catch {
          weeklyAppointments = [];
        }

        try {
          const sp = new URLSearchParams(location.search || "");
          if (sp.get("debugCalendar") === "1") {
            const raw0 = weeklyAppointments && weeklyAppointments[0];
            const n0 = raw0 ? normalizeIncomingAppointment(raw0) : null;
            console.log("[debugCalendar]", {
              rangeStart,
              rangeEnd,
              totalRaw: (weeklyAppointments || []).length,
              sampleRawKeys: raw0 ? Object.keys(raw0) : [],
              sampleRawStart: raw0?.startAt || raw0?.timelineAt || raw0?.date,
              sampleNormalized: n0,
            });
          }
        } catch (_) {}

        const rawAppt = weeklyAppointments || [];
        let invalidAppt = 0;
        allAppointments = rawAppt
          .map((row) => {
            const n = normalizeIncomingAppointment(row);
            if (!n) invalidAppt++;
            return n;
          })
          .filter(Boolean);

        console.log("[calendar appointments] RAW LENGTH:", rawAppt.length);
        console.log("[calendar appointments] EVENTS LENGTH:", allAppointments.length);
        console.log("[calendar appointments] INVALID COUNT:", invalidAppt);

        if (requestId !== activeLoadRequestId) return;

        const hasDoctorsFromApi = doctorSelect.options.length > 1;
        if (!hasDoctorsFromApi) renderDoctors(allAppointments);
        if (doctorSelect.options.length <= 1) {
          const fallback = document.createElement('option');
          fallback.value = '';
          fallback.textContent = t('calendar.doctorNotFound');
          doctorSelect.appendChild(fallback);
          doctorSelect.value = '';
        }
        renderChairs(allAppointments);
        {
          const container = document.getElementById('calendarGrid');
          if (container) container.innerHTML = '';
          renderGrid(allAppointments, lang);
        }

        fetchRangeTimelineEvents(rangeStart, rangeEnd)
          .then((weeklyTimelineEvents) => {
            if (requestId !== activeLoadRequestId) return;
            const merged = mergeUniqueAppointments(allAppointments, weeklyTimelineEvents);
            const tlRaw = weeklyTimelineEvents.__adminEventsRawTotal != null ? weeklyTimelineEvents.__adminEventsRawTotal : 0;
            const invTl = weeklyTimelineEvents.__adminEventsInvalidTl || 0;
            console.log("[calendar pipeline] RAW LENGTH:", rawAppt.length + tlRaw);
            console.log("[calendar pipeline] EVENTS LENGTH (merged):", merged.length);
            console.log("[calendar pipeline] INVALID COUNT:", invalidAppt + invTl);
            allAppointments = merged;
            const hasDoctorsAfterMerge = doctorSelect.options.length > 1;
            if (!hasDoctorsAfterMerge) renderDoctors(allAppointments);
            renderChairs(allAppointments);
            {
              const container = document.getElementById('calendarGrid');
              if (container) container.innerHTML = '';
              renderGrid(allAppointments, lang);
            }
          })
          .catch(() => {});
      } catch (error) {
        if (requestId !== activeLoadRequestId) return;
        if (String(error?.message || '') === 'unauthorized') {
          localStorage.removeItem('adminToken');
          localStorage.removeItem('admin_token');
          localStorage.removeItem('token');
          gridEl.innerHTML = `<div class="muted" style="padding:10px;">${t('calendar.sessionExpired')}</div>`;
          setTimeout(() => {
            window.location.href = '/admin-login.html';
          }, 700);
          return;
        }
        gridEl.innerHTML = `<div class="muted" style="padding:10px;">${t('calendar.fetchFailed', { message: String(error?.message || error) })}</div>`;
      }
    }

    doctorSelect.addEventListener('change', () => {
      const container = document.getElementById('calendarGrid');
      if (container) container.innerHTML = '';
      const lang = currentLanguage();
      renderGrid(allAppointments, lang);
    });
    if (chairSelect) {
      chairSelect.addEventListener('change', () => {
        const container = document.getElementById('calendarGrid');
        if (container) container.innerHTML = '';
        const lang = currentLanguage();
        renderGrid(allAppointments, lang);
      });
    }
    if (viewModeWeekBtn) {
      viewModeWeekBtn.addEventListener('click', () => {
        viewMode = 'week';
        setViewToggles();
        loadAppointments();
      });
    }
    if (viewModeMonthBtn) {
      viewModeMonthBtn.addEventListener('click', () => {
        viewMode = 'month';
        monthY = weekStart.getFullYear();
        monthM = weekStart.getMonth();
        setViewToggles();
        loadAppointments();
      });
    }
    prevWeekBtn.addEventListener('click', () => {
      if (viewMode === 'month') {
        monthM -= 1;
        if (monthM < 0) {
          monthM = 11;
          monthY -= 1;
        }
      } else {
        weekStart = addDays(weekStart, -7);
      }
      loadAppointments();
    });
    nextWeekBtn.addEventListener('click', () => {
      if (viewMode === 'month') {
        monthM += 1;
        if (monthM > 11) {
          monthM = 0;
          monthY += 1;
        }
      } else {
        weekStart = addDays(weekStart, 7);
      }
      loadAppointments();
    });
    todayBtn.addEventListener('click', () => {
      const n = new Date();
      if (viewMode === 'month') {
        monthY = n.getFullYear();
        monthM = n.getMonth();
      } else {
        weekStart = getStartOfWeek(n);
      }
      loadAppointments();
    });

    async function bootstrapSchedule() {
      await Promise.all([
        loadDoctorsFromApi().catch(() => {}),
        loadChairCountFromClinic().catch(() => {}),
        loadTreatmentTimings().catch(() => {}),
      ]);
      loadAppointments();
    }

    Object.defineProperty(window, "allAppointments", {
      get: function () { return allAppointments; },
      configurable: true
    });
    window.renderGrid = renderGrid;
    window.applyScheduleStaticI18n = applyScheduleStaticI18n;

    bootstrapSchedule();
  </script>
