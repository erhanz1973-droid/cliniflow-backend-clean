<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/api-base.js?v=202605098"></script>
  <script src="/admin-i18n.js?v=36"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="leads.documentTitle">Lead management — Clinifly Admin</title>
  <link rel="stylesheet" href="/admin-layout.css?v=202605162"/>
  <script>
    (function() {
      const token = localStorage.getItem("adminToken") || localStorage.getItem("admin_token");
      const userStr = localStorage.getItem("user") || localStorage.getItem("adminUser");
      if (!token || !userStr) {
        window.location.href = "/admin-login.html";
        return;
      }
      try {
        const user = JSON.parse(userStr);
        if (!user || user.role !== "ADMIN") {
          window.location.href = "/admin-login.html";
        }
      } catch (e) {
        window.location.href = "/admin-login.html";
      }
    })();
  </script>
  <style>
    :root {
      --bg:#111827; --card:#1f2937; --b:#374151; --muted:#9ca3af; --accent:#2563eb;
      --g:#22c55e; --amber:#fbbf24;
    }
    body { font-family: system-ui, sans-serif; margin:0; background:var(--bg); color:#e5e7eb; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; max-width: 720px; line-height: 1.45; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
    label.chk { display:flex;align-items:center;gap:8px;color:#cbd5e1;font-size:0.9rem;cursor:pointer; }
    select, button { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--b); background: var(--card); color: #e5e7eb; font-size: 0.85rem; }
    button.primary { background: var(--accent); border-color: #1d4ed8; cursor: pointer; }
    button.danger { background: #7f1d1d; border-color: #991b1b; cursor: pointer; color: #fecaca; }
    button.ghost { background: transparent; border-color: var(--b); cursor: pointer; color: #93c5fd; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .toolbar-auto { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
    .toolbar-auto button.secondary { background: #374151; border-color: #4b5563; color: #e5e7eb; }
    #autoProgress { color: #93c5fd; font-size: 0.85rem; min-height: 1.2em; }
    .table-scroll { overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 920px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--b); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; background: rgba(31,41,55,0.9); }
    tr:last-child td { border-bottom: none; }
    .preview { max-width: 260px; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; }
    .err { color: #f87171; margin-top: 12px; }
    .ok { color: #4ade80; margin-top: 12px; }
    .badge-unassigned {
      display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 6px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.45); color: var(--amber);
    }
    .badge-assigned {
      display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 6px;
      font-size: 0.72rem; font-weight: 700;
      background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac;
    }
    .primary-name { font-weight: 600; color: #e5e7eb; }
    .actions-stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
    .actions-stack select { max-width: 220px; }
    .mono { font-size: 0.72rem; color: #6b7280; word-break: break-all; }
    .routing-card {
      border: 1px solid var(--b); border-radius: 12px; padding: 16px 18px; margin-bottom: 20px;
      background: rgba(31,41,55,0.55); max-width: 640px;
    }
    .routing-card h2 { font-size: 1rem; margin: 0 0 12px; font-weight: 600; color: #e5e7eb; }
    .routing-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
    .routing-row:last-child { margin-bottom: 0; }
    .routing-row label { color: #cbd5e1; font-size: 0.88rem; min-width: 140px; }
    .routing-row select { min-width: 220px; flex: 1; max-width: 320px; }
    #routingStatus { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 data-i18n="leads.pageTitle">Lead inbox</h1>
    <p class="sub" data-i18n="leads.subtitle">Primary responder per thread; clinic team can still view threads in Messages.</p>

    <div class="routing-card" id="leadRoutingCard">
      <h2 data-i18n="leads.leadRoutingSectionTitle">New lead routing</h2>
      <p class="sub" style="margin-top:-4px;margin-bottom:12px;font-size:0.82rem;" data-i18n="leads.leadRoutingHelp">
        Applies when a new lead thread is created. Does not change existing threads or manual assignment.
      </p>
      <label class="chk" style="margin-bottom:12px;">
        <input type="checkbox" id="leadRoutingEnabled" />
        <span data-i18n="leads.leadRoutingEnable">Enable automatic primary assignment for new leads</span>
      </label>
      <div class="routing-row">
        <label for="leadRoutingMode" data-i18n="leads.leadRoutingMode">Routing mode</label>
        <select id="leadRoutingMode">
          <option value="manual_only" data-i18n="leads.leadRoutingModeManual">Manual only — stay unassigned</option>
          <option value="fixed_doctor" data-i18n="leads.leadRoutingModeFixed">Fixed doctor</option>
          <option value="round_robin" data-i18n="leads.leadRoutingModeRoundRobin">Round robin (eligible doctors)</option>
          <option value="balanced" data-i18n="leads.leadRoutingModeBalanced">Balanced (least assigned leads)</option>
        </select>
      </div>
      <div class="routing-row" id="leadRoutingFixedRow" style="display:none;">
        <label for="leadRoutingFixedDoctor" data-i18n="leads.leadRoutingFixedDoctor">Fixed doctor</label>
        <select id="leadRoutingFixedDoctor"></select>
      </div>
      <div class="routing-row">
        <button type="button" class="primary" id="btnSaveLeadRouting" data-i18n="leads.leadRoutingSave">Save routing settings</button>
      </div>
      <div id="routingStatus" aria-live="polite"></div>
    </div>

    <div class="toolbar-auto">
      <button type="button" class="primary" id="btnAutoAssignAll" data-i18n="leads.autoAssignAll">Auto-assign all unassigned</button>
      <button type="button" class="secondary" id="btnAutoAssignSelected" data-i18n="leads.autoAssignSelected">Auto-assign selected</button>
    </div>
    <div id="autoProgress" aria-live="polite"></div>
    <div class="row">
      <label class="chk">
        <input type="checkbox" id="showAssigned" />
        <span data-i18n="leads.showAssignedToggle">Show assigned threads</span>
      </label>
      <button type="button" class="primary" id="refresh" data-i18n="leads.refreshList">Refresh list</button>
      <span id="status"></span>
    </div>
    <div id="error" class="err"></div>
    <div id="success" class="ok"></div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:36px;"><input type="checkbox" id="selectAllLeads" /></th>
            <th data-i18n="leads.thPatient">Patient</th>
            <th data-i18n="leads.thContact">Contact</th>
            <th data-i18n="leads.thPreview">Last message</th>
            <th data-i18n="leads.thPrimary">Primary doctor</th>
            <th data-i18n="leads.thLastActivity">Last activity</th>
            <th data-i18n="leads.thStatus">Status</th>
            <th data-i18n="leads.thActions">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    function t(key, params) {
      return (window.i18n && window.i18n.t) ? window.i18n.t(key, params || {}) : key;
    }
    window.rerenderLeads = function() { refresh(); };

    const API_BASE = (typeof cliniflowAdminApiOrigin === "function"
      ? cliniflowAdminApiOrigin()
      : "https://cliniflow-backend-clean-production.up.railway.app");

    function authHeaders() {
      const token = localStorage.getItem("adminToken") || localStorage.getItem("admin_token");
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + (token || ""),
      };
    }

    let doctors = [];

    async function loadDoctors() {
      const res = await fetch(API_BASE + "/api/admin/doctors", { headers: authHeaders() });
      const j = await res.json().catch(() => ({}));
      if (!res.ok || !j.ok) throw new Error(j.error || t("leads.errLoad"));
      doctors = j.doctors || j.data || j.items || [];
    }

    async function loadThreads() {
      const includeAssigned = document.getElementById("showAssigned")?.checked ? "1" : "0";
      const res = await fetch(
        API_BASE + "/api/admin/unassigned-messages?includeAssigned=" + encodeURIComponent(includeAssigned),
        { headers: authHeaders() }
      );
      const j = await res.json().catch(() => ({}));
      if (!res.ok || !j.ok) throw new Error(j.error || t("leads.errLoad"));
      return j.messages || [];
    }

    function fillRoutingFixedDoctorOptions(selectedId) {
      const sel = document.getElementById("leadRoutingFixedDoctor");
      if (!sel) return;
      const cur = selectedId != null ? String(selectedId) : sel.value;
      sel.innerHTML =
        '<option value="">' + escapeHtml(t("leads.selectDoctor")) + "</option>" +
        doctors.map((d) =>
          '<option value="' + escapeAttr(d.id) + '">' + escapeHtml(d.name || d.email || d.id) + "</option>"
        ).join("");
      if (cur && [...sel.options].some((o) => o.value === cur)) sel.value = cur;
    }

    function syncLeadRoutingFixedRow() {
      const mode = document.getElementById("leadRoutingMode")?.value || "manual_only";
      const row = document.getElementById("leadRoutingFixedRow");
      if (row) row.style.display = mode === "fixed_doctor" ? "flex" : "none";
    }

    async function loadLeadRoutingSettingsUi() {
      const statusEl = document.getElementById("routingStatus");
      if (!statusEl) return;
      statusEl.textContent = "";
      const routingIds = ["leadRoutingEnabled", "leadRoutingMode", "leadRoutingFixedDoctor", "btnSaveLeadRouting"];
      try {
        const res = await fetch(API_BASE + "/api/admin/clinic-lead-routing-settings", { headers: authHeaders() });
        const j = await res.json().catch(() => ({}));
        if (!res.ok || !j.ok) {
          const msg =
            j.error === "lead_routing_table_unavailable"
              ? t("leads.leadRoutingTableMissing")
              : j.message || j.error || t("leads.leadRoutingLoadError");
          statusEl.textContent = msg;
          routingIds.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.disabled = true;
          });
          return;
        }
        routingIds.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = false;
        });
        const s = j.settings || {};
        const en = document.getElementById("leadRoutingEnabled");
        const modeEl = document.getElementById("leadRoutingMode");
        if (en) en.checked = !!s.autoRoutingEnabled;
        if (modeEl) {
          const m = s.routingMode;
          modeEl.value =
            m && ["manual_only", "fixed_doctor", "round_robin", "balanced"].includes(m) ? m : "manual_only";
        }
        fillRoutingFixedDoctorOptions(s.fixedDoctorId || "");
        syncLeadRoutingFixedRow();
      } catch (e) {
        statusEl.textContent = String(e.message || e || t("leads.leadRoutingLoadError"));
      }
    }

    async function saveLeadRoutingSettings() {
      const statusEl = document.getElementById("routingStatus");
      document.getElementById("error").textContent = "";
      document.getElementById("success").textContent = "";
      const enabled = !!document.getElementById("leadRoutingEnabled")?.checked;
      const routingMode = document.getElementById("leadRoutingMode")?.value || "manual_only";
      const fixedDoctorId = document.getElementById("leadRoutingFixedDoctor")?.value || "";
      const btn = document.getElementById("btnSaveLeadRouting");
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(API_BASE + "/api/admin/clinic-lead-routing-settings", {
          method: "PUT",
          headers: authHeaders(),
          body: JSON.stringify({
            autoRoutingEnabled: enabled,
            routingMode,
            fixedDoctorId: fixedDoctorId || null,
          }),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok || !j.ok) throw new Error(j.message || j.error || t("leads.errLoad"));
        document.getElementById("success").textContent = t("leads.leadRoutingSaved");
        if (statusEl && j.settings && j.settings.updatedAt) {
          statusEl.textContent = fmtWhen(j.settings.updatedAt);
        }
        await loadLeadRoutingSettingsUi();
      } catch (e) {
        document.getElementById("error").textContent = String(e.message || e);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return String(s || "").replace(/"/g, "&quot;");
    }

    function fmtWhen(iso) {
      if (!iso) return "—";
      try {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "—";
        return d.toLocaleString(undefined, { dateStyle: "short", timeStyle: "short" });
      } catch (_) {
        return "—";
      }
    }

    function primaryLabel(m) {
      const isAssigned = !!m.assignedDoctorId;
      const nm = (m.assignedDoctor && String(m.assignedDoctor.name || "").trim()) || "";
      if (isAssigned && nm) return nm;
      if (isAssigned) return "—";
      return "";
    }

    function doctorDisplayForDistribution(doctorId) {
      const id = String(doctorId || "").trim();
      const row = doctors.find((d) => String(d.id || "") === id);
      return (row && String(row.name || row.email || "").trim()) || id.slice(0, 8) + "…";
    }

    function setAutoAssignBusy(busy) {
      ["btnAutoAssignAll", "btnAutoAssignSelected", "refresh"].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.disabled = !!busy;
      });
      const sa = document.getElementById("selectAllLeads");
      if (sa) sa.disabled = !!busy;
      document.querySelectorAll("input.lead-select").forEach((cb) => {
        cb.disabled = !!busy;
      });
      document.querySelectorAll("#tbody button").forEach((b) => {
        b.disabled = !!busy;
      });
      document.querySelectorAll("#tbody select").forEach((s) => {
        s.disabled = !!busy;
      });
    }

    async function runAutoAssign(body) {
      document.getElementById("error").textContent = "";
      document.getElementById("success").textContent = "";
      document.getElementById("autoProgress").textContent = t("leads.autoAssignRunning");
      setAutoAssignBusy(true);
      try {
        const res = await fetch(API_BASE + "/api/admin/auto-assign-leads", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(body),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok || !j.ok) {
          throw new Error(j.message || j.error || t("leads.errLoad"));
        }
        let okMsg =
          t("leads.autoAssignDone", {
            assigned: String(j.assigned != null ? j.assigned : 0),
            skipped: String(j.skipped != null ? j.skipped : 0),
            failed: String(j.failed != null ? j.failed : 0),
          }) || "";
        if (Array.isArray(j.distribution) && j.distribution.length) {
          const distStr = j.distribution
            .map((d) => doctorDisplayForDistribution(d.doctorId) + ": " + String(d.count))
            .join(", ");
          okMsg += " " + t("leads.autoAssignDistributionPrefix") + " " + distStr;
        }
        document.getElementById("success").textContent = okMsg.trim();
        const failedN = Number(j.failed) || 0;
        if (failedN > 0 && Array.isArray(j.failedDetails) && j.failedDetails.length) {
          const snippet = j.failedDetails
            .slice(0, 6)
            .map((x) => String(x.patientId || "").slice(0, 8) + "…: " + String(x.error || ""))
            .join("; ");
          document.getElementById("error").textContent =
            t("leads.autoAssignPartialFail") + " " + snippet;
        }
        await refresh();
      } catch (e) {
        document.getElementById("error").textContent = String(e.message || e);
      } finally {
        document.getElementById("autoProgress").textContent = "";
        setAutoAssignBusy(false);
      }
    }

    function render(messages) {
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "";
      if (!messages.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 8;
        td.textContent = t("leads.empty");
        td.style.color = "#9ca3af";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      for (const m of messages) {
        const tr = document.createElement("tr");
        const name = (m.patientName || "—") + (m.patientIdPublic ? " (" + m.patientIdPublic + ")" : "");
        const contact = [m.email || "", m.phone || ""].filter(Boolean).join(" · ") || "—";
        const preview = m.previewText || "—";
        const pid = m.patientId;
        const msgId = m.previewMessageId || pid;
        const isAssigned = !!m.assignedDoctorId;
        const lastAct = m.updatedAt || m.assignedAt || m.createdAt || null;
        const st = String(m.status || "—");

        const checkCell = document.createElement("td");
        if (!isAssigned) {
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.className = "lead-select";
          cb.setAttribute("data-patient-id", pid);
          checkCell.appendChild(cb);
        }

        const patientCell = document.createElement("td");
        patientCell.innerHTML =
          escapeHtml(name) +
          '<div class="mono">' + escapeHtml(pid) + "</div>" +
          (!isAssigned
            ? '<span class="badge-unassigned">' + escapeHtml(t("leads.badgeUnassigned")) + "</span>"
            : '<span class="badge-assigned">' + escapeHtml(t("leads.badgePrimarySet")) + "</span>");

        const contactCell = document.createElement("td");
        contactCell.textContent = contact;

        const previewCell = document.createElement("td");
        previewCell.className = "preview";
        previewCell.textContent = preview;

        const primaryCell = document.createElement("td");
        const pl = primaryLabel(m);
        primaryCell.innerHTML = pl
          ? '<span class="primary-name">' + escapeHtml(pl) + "</span>"
          : '<span style="color:#6b7280">' + escapeHtml(t("leads.primaryNone")) + "</span>";

        const actCell = document.createElement("td");
        actCell.textContent = fmtWhen(lastAct);

        const stCell = document.createElement("td");
        stCell.textContent = st;

        const actionsCell = document.createElement("td");
        const stack = document.createElement("div");
        stack.className = "actions-stack";

        const openBtn = document.createElement("button");
        openBtn.type = "button";
        openBtn.className = "ghost";
        openBtn.textContent = t("leads.openChat");
        openBtn.addEventListener("click", () => {
          window.location.href = "/admin-chat.html?patientId=" + encodeURIComponent(pid);
        });
        stack.appendChild(openBtn);

        const sel = document.createElement("select");
        sel.innerHTML =
          '<option value="">' + escapeHtml(t("leads.selectDoctor")) + "</option>" +
          doctors.map((d) =>
            '<option value="' + escapeAttr(d.id) + '">' + escapeHtml(d.name || d.email || d.id) + "</option>"
          ).join("");
        if (isAssigned && m.assignedDoctorId) {
          sel.value = String(m.assignedDoctorId);
        }

        const assignBtn = document.createElement("button");
        assignBtn.type = "button";
        assignBtn.className = "primary";
        assignBtn.textContent = isAssigned ? t("leads.reassign") : t("leads.assign");

        assignBtn.addEventListener("click", async () => {
          document.getElementById("error").textContent = "";
          document.getElementById("success").textContent = "";
          const doctorId = sel.value;
          if (!doctorId) {
            document.getElementById("error").textContent = t("leads.errChooseDoctor");
            return;
          }
          assignBtn.disabled = true;
          try {
            const res = await fetch(API_BASE + "/api/admin/assign-doctor", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ messageId: msgId, doctorId: doctorId }),
            });
            const j = await res.json().catch(() => ({}));
            if (!res.ok || !j.ok) throw new Error(j.error || j.message || t("leads.errLoad"));
            document.getElementById("success").textContent = t("leads.successAssigned");
            await refresh();
          } catch (e) {
            document.getElementById("error").textContent = String(e.message || e);
          } finally {
            assignBtn.disabled = false;
          }
        });

        stack.appendChild(sel);
        stack.appendChild(assignBtn);

        if (isAssigned) {
          const unBtn = document.createElement("button");
          unBtn.type = "button";
          unBtn.className = "danger";
          unBtn.textContent = t("leads.unassign");
          unBtn.addEventListener("click", async () => {
            if (!confirm(t("leads.confirmUnassign"))) return;
            document.getElementById("error").textContent = "";
            document.getElementById("success").textContent = "";
            unBtn.disabled = true;
            try {
              const res = await fetch(API_BASE + "/api/admin/unassign-lead", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({ patientId: pid }),
              });
              const j = await res.json().catch(() => ({}));
              if (!res.ok || !j.ok) throw new Error(j.error || j.message || t("leads.errLoad"));
              document.getElementById("success").textContent = t("leads.successUnassigned");
              await refresh();
            } catch (e) {
              document.getElementById("error").textContent = String(e.message || e);
            } finally {
              unBtn.disabled = false;
            }
          });
          stack.appendChild(unBtn);
        }

        actionsCell.appendChild(stack);

        tr.appendChild(checkCell);
        tr.appendChild(patientCell);
        tr.appendChild(contactCell);
        tr.appendChild(previewCell);
        tr.appendChild(primaryCell);
        tr.appendChild(actCell);
        tr.appendChild(stCell);
        tr.appendChild(actionsCell);
        tbody.appendChild(tr);
      }
    }

    async function refresh() {
      const el = document.getElementById("status");
      el.textContent = t("leads.statusLoading");
      document.getElementById("error").textContent = "";
      try {
        await loadDoctors();
        await loadLeadRoutingSettingsUi();
        const messages = await loadThreads();
        render(messages);
        el.textContent = t("leads.statusUnassigned", { count: String(messages.length) });
        const selAll = document.getElementById("selectAllLeads");
        if (selAll) {
          selAll.checked = false;
          selAll.title = t("leads.selectAllUnassignedTitle");
          selAll.onclick = () => {
            document.querySelectorAll("input.lead-select").forEach((cb) => {
              cb.checked = selAll.checked;
            });
          };
        }
      } catch (e) {
        el.textContent = "";
        document.getElementById("error").textContent = String(e.message || e);
      }
    }

    document.getElementById("refresh").addEventListener("click", refresh);
    document.getElementById("showAssigned").addEventListener("change", refresh);
    document.getElementById("leadRoutingMode").addEventListener("change", syncLeadRoutingFixedRow);
    document.getElementById("btnSaveLeadRouting").addEventListener("click", saveLeadRoutingSettings);

    document.getElementById("btnAutoAssignAll").addEventListener("click", async () => {
      if (!confirm(t("leads.autoAssignAllConfirm"))) return;
      await runAutoAssign({ assignAllUnassigned: true });
    });
    document.getElementById("btnAutoAssignSelected").addEventListener("click", async () => {
      const ids = [...document.querySelectorAll("input.lead-select:checked")].map((cb) =>
        String(cb.getAttribute("data-patient-id") || "").trim()
      ).filter(Boolean);
      if (!ids.length) {
        document.getElementById("error").textContent = t("leads.autoAssignNoneSelected");
        return;
      }
      await runAutoAssign({ patientIds: ids });
    });

    refresh();
  </script>
