<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <script src="/api-base.js?v=202605184"></script>
  <script src="/admin-i18n.js?v=36"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hastalar - Clinifly Admin</title>
  <link rel="stylesheet" href="/admin-layout.css?v=202605162"/>
  <script>
    // Token and role check - redirect to login if not authenticated or not admin
    (function() {
      const token = localStorage.getItem("adminToken") || localStorage.getItem("admin_token");
      const userStr = localStorage.getItem("user") || localStorage.getItem("adminUser");
      
      if (!token) {
        console.log("[AUTH] No admin token found, redirecting to login");
        window.location.href = "/admin-login.html";
        return;
      }
      
      if (!userStr) {
        console.log("[AUTH] No user data found, redirecting to login");
        window.location.href = "/admin-login.html";
        return;
      }
      
      try {
        const user = JSON.parse(userStr);
        if (!user || user.role !== "ADMIN") {
          console.log("[AUTH] Invalid role, redirecting to login:", user?.role);
          window.location.href = "/admin-login.html";
          return;
        }
        console.log("[AUTH] Admin access confirmed for user:", user.email);
      } catch (error) {
        console.error("[AUTH] Error parsing user data:", error);
        window.location.href = "/admin-login.html";
        return;
      }
    })();
  </script>
  <style>
    :root {
      --bg:#f1f5f9;
      --card:#ffffff;
      --b:#e2e8f0;
      --b-strong:#cbd5e1;
      --p:#2563eb;
      --g:#16a34a;
      --r:#dc2626;
      --y:#f59e0b;
      --muted:#64748b;
      --text:#0f172a;
      --text-soft:#334155;
      --link:#2563eb;
      --input-bg:#ffffff;
      --input-text:#0f172a;
    }
    body{ font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; margin:0; background:var(--bg); color:var(--text); }
    body.al-ready { background: var(--bg); color: var(--text); }
    .wrap{ max-width:1280px; width:100%; margin:0 auto; padding:24px 20px 40px; box-sizing:border-box; }
    header{ margin-bottom:20px; border-bottom:1px solid var(--b); padding-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; }
    h1{ font-size:24px; margin:0 0 20px; font-weight:700; color:var(--text); }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
      padding: 16px 18px;
      border: 1px solid var(--b);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 1px 3px rgba(15,23,42,0.06);
      flex-wrap: wrap;
    }
    .navbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-logo img {
      height: 32px;
      width: auto;
    }
    .navbar-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--p);
      display: none; /* Hide text, show logo only */
    }
    .navbar-clinic-name {
      font-size: 16px;
      color: var(--text-soft);
      font-weight: 600;
    }
    .navbar-center {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    .navbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .nav-link {
      color: var(--text-soft);
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      position: relative;
      transition: all 0.2s;
    }
    .nav-link:hover {
      color: var(--text);
      background: #eff6ff;
    }
    .nav-link.active {
      color: #fff;
      background: var(--p);
      font-weight: 600;
    }
    .nav-link.secondary {
      color: var(--muted);
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid var(--b);
      background: #f8fafc;
    }
    .nav-link.secondary:hover {

      background: #f1f5f9;
      border-color: var(--b-strong);
    }
    .lang-toggle {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--muted);
      border: 1px solid var(--b);
      background: #f8fafc;
    }
    .lang-toggle span {

      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .lang-toggle span.active {
      color: #fff;
      background: rgba(37, 99, 235, 0.3);
    }
    .nav-badge{
      position:absolute;
      top:-4px;
      right:-4px;
      background:var(--r);
      color:#fff;
      border-radius:10px;
      min-width:18px;
      height:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:700;
      padding:0 4px;
      border:2px solid var(--card);
    }

    .card{ background:var(--card); border:1px solid var(--b); border-radius:16px; padding:24px; box-shadow:0 4px 24px rgba(15,23,42,0.06); }
    .toolbar{ display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .toolbar-left{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .toolbar-right{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    input, select{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--b-strong);
      background:var(--input-bg);
      color:var(--input-text);
      font-size:14px;
      min-width:240px;
    }
    input::placeholder{ color:#94a3b8; }
    select option { color: var(--input-text); background: var(--input-bg); }

    /* Mini Card Grid Layout */
    .patients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .patient-card {
      background: var(--card);
      border: 1px solid var(--b);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15,23,42,0.04);
    }
    .patient-card:hover {
      border-color: #93c5fd;
      background: #f8fafc;
      box-shadow: 0 4px 16px rgba(37,99,235,0.08);
    }
    .patient-card.selected {
      outline: 2px solid #2563eb;
      outline-offset: -2px;
      background: #eff6ff;
      border-color: #2563eb;
    }
    .patient-avatar-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .patient-avatar-initials {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .patient-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .patient-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      margin: 0;
      flex: 1;
    }
    .clinic-code-badge {
      display: inline-block;
      padding: 3px 8px;

      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #93c5fd;
      margin-left: 8px;
    }
    .doctor-badge {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #3b82f6;
      margin-left: 8px;
      transition: all 0.2s ease;
    }
    .patient-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .progress-section {
      margin-bottom: 12px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;

    }

      border-radius: 4px;
      overflow: hidden;

    .progress-bar.warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .progress-bar.danger { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .card-actions button {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      padding: 8px 12px;
    }

    code{ background:#f1f5f9; padding:2px 6px; border-radius:6px; border:1px solid var(--b); color:var(--text); }

    .status{ display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:800; border:1px solid var(--b-strong); text-transform:uppercase; }
    .status.PENDING{ background:#fffbeb; color:#b45309; border-color:#fcd34d; }
    .status.APPROVED{ background:#ecfdf5; color:#047857; border-color:#6ee7b7; }

    button{ padding:8px 14px; border-radius:10px; border:1px solid transparent; cursor:pointer; font-size:13px; font-weight:800; transition:opacity 0.2s; }
    button:hover{ opacity:0.92; }
    button:disabled{ opacity:0.5; cursor:not-allowed; }
    .btn-approve{ background:var(--g); color:#fff; }
    /* Primary: Treatment (most important) */
    .btn-treatment{ background:var(--p); color:#fff; border-color:var(--p); }
    /* Secondary: Chat (secondary importance) */
    .btn-chat{ background:#fff; border-color:var(--b-strong); color:var(--text-soft); }
    .btn-chat:hover{ background:#f8fafc; border-color:#cbd5e1; color:var(--text); }
    /* Ghost: Travel / Health / Files (tertiary, less visual weight) */

    .btn-travel:hover, .btn-health:hover{ background:#f8fafc; border-color:#cbd5e1; color:var(--text); }

      border-radius:12px;

    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: var(--card);
      border: 1px solid var(--b);
      border-radius: 16px;
      width: min(720px, 96vw);
      max-width: min(720px, 96vw);
      min-width: min(720px, 96vw);
      min-height: min(420px, 85vh);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.18);
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {

      border-bottom: 1px solid var(--b);

      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    
    .modal-close {

      border: none;
      font-size: 24px;

      color: var(--muted);

      height: 32px;

      align-items: center;
      justify-content: center;

      transition: all 0.2s;
    }
    
    .modal-close:hover {
      background: #f1f5f9;
      color: var(--text);
    }
    
    .modal-body {
      padding: 24px;
      flex: 1;
      min-height: 0;
    }
    
    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--b);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-shrink: 0;
      background: #fafafa;
      border-radius: 0 0 16px 16px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text-soft);
      font-size: 14px;
    }
    
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--b-strong);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--input-text);
      font-size: 15px;
      line-height: 1.45;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-group input[type="date"] {
      min-height: 48px;
      color-scheme: light;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--p);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    
    .btn-primary {
      background: var(--g);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: #15803d;
      transform: translateY(-1px);
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .modal-content {
        width: 96vw;
        max-width: 96vw;
        min-width: 0;
        min-height: min(380px, 80vh);
        margin: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 data-i18n="patients.title">👥 Clinifly Admin – Patients</h1>
      <div id="usageBadge" style="display:none; padding:6px 12px; border:1px solid #cbd5e1; border-radius:999px; background:#eff6ff; color:#1e40af; font-size:12px; font-weight:800; margin-top:12px;"></div>
    </header>


    <div id="tokenInfo" class="token-info" style="display:none;" data-i18n="patients.errors.noToken"></div>

    <div id="errorMsg" class="error" style="display:none;"></div>

    <div id="selectedBar" class="selected-bar">
      <div class="toolbar">
        <div>
          <div class="selected-title" id="selectedTitle"></div>
          <div class="selected-meta" id="selectedMeta"></div>
        </div>
        <div class="actions">
          <button class="btn-travel" onclick="openTravel(getSelectedPatientId())" data-i18n="patients.travel"></button>
          <button class="btn-treatment" onclick="openTreatment(getSelectedPatientId())" data-i18n="patients.treatment"></button>
          <button class="btn-health" onclick="openHealth(getSelectedPatientId())" data-i18n="patients.health"></button>
          <button class="btn-chat" onclick="openChat(getSelectedPatientId())" data-i18n="patients.chat"></button>
          <button class="btn-files" onclick="openFiles(getSelectedPatientId())" data-i18n="patients.files">📁 Dosyalar</button>
          <button class="btn-ghost" onclick="copySelectedPatientId()" data-i18n="patients.copyId"></button>
          <button class="btn-ghost" onclick="clearSelectedPatient()" data-i18n="patients.clear"></button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar" style="margin-bottom:12px;">
        <div class="toolbar-left">
          <h2 style="margin:0; font-size:18px;" data-i18n="patients.registeredPatients"></h2>
          <input id="searchInput" type="search" data-i18n-placeholder="patients.searchPlaceholder" />
          <select id="statusFilter" style="min-width:180px;">
            <option value="" data-i18n="patients.filterAll"></option>
            <option value="PENDING" data-i18n="patients.status.PENDING">PENDING</option>
            <option value="APPROVED" data-i18n="patients.status.APPROVED">APPROVED</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn-primary" onclick="showAddPatientModal()" style="background:var(--g); color:#fff; margin-right:8px;" data-i18n="patients.addPatient">➕ Add Patient</button>
          <button class="btn-ghost" onclick="clearFilters()" data-i18n="patients.clearFilters"></button>
          <button onclick="loadPatients()" style="background:var(--p); color:#fff;" data-i18n="patients.refresh"></button>
        </div>
      </div>

      <div id="loading" class="loading" data-i18n="patients.loading"></div>
      <div id="patientsGrid" class="patients-grid" style="display:none;"></div>
    </div>
  </div>

  <!-- Add Patient Modal -->
  <div id="addPatientModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="patients.addPatientTitle">Add New Patient</h3>
        <button class="modal-close" onclick="hideAddPatientModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="addPatientForm">
          <div class="form-row">
            <div class="form-group">
              <label for="patientFirstName" data-i18n="patients.firstName">First Name *</label>
              <input type="text" id="patientFirstName" required>
            </div>
            <div class="form-group">
              <label for="patientLastName" data-i18n="patients.lastName">Last Name *</label>
              <input type="text" id="patientLastName" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="patientEmail" data-i18n="patients.email">Email</label>
              <input type="email" id="patientEmail">
            </div>
            <div class="form-group">
              <label for="patientPhone" data-i18n="patients.phone">Phone</label>
              <input type="tel" id="patientPhone">
            </div>
          </div>
          
          <div class="form-group">
            <label for="patientDateOfBirth" data-i18n="patients.dateOfBirth">Date of Birth</label>
            <input type="date" id="patientDateOfBirth">
          </div>
          
          <div class="form-group">
            <label for="patientAddress" data-i18n="patients.address">Address</label>
            <textarea id="patientAddress" rows="3"></textarea>
          </div>
          
          <div class="form-group">
            <label for="patientNotes" data-i18n="patients.notes">Notes</label>
            <textarea id="patientNotes" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" onclick="hideAddPatientModal()" data-i18n="patients.cancel">Cancel</button>
        <button type="button" class="btn-primary" onclick="addPatient()" data-i18n="patients.add">Add Patient</button>
      </div>
    </div>
  </div>

  <script>
    // Nav: if a patient is selected, make top-nav Travel link carry patientId.
    (function bindNavTravelLink() {
      try {
        const pid = String(localStorage.getItem('selected_patient_id') || '').trim();
        if (!pid) return;
        const a = document.querySelector('.nav a[href="/admin-travel.html"]');
        if (a) a.href = `/admin-travel.html?patientId=${encodeURIComponent(pid)}`;
      } catch {}
    })();

    const API_BASE = (function resolvePatientsApiOrigin() {
      if (typeof cliniflowAdminApiOrigin === 'function') {
        const b = cliniflowAdminApiOrigin();
        if (b && /^https?:\/\//i.test(String(b))) return String(b).replace(/\/+$/, '');
      }
      return 'https://cliniflow-backend-clean-production.up.railway.app';
    })();

    function patientsFetchUrl(path) {
      const p = path.startsWith('/') ? path : '/' + path;
      if (typeof apiUrl === 'function') {
        const u = apiUrl(p);
        if (String(u).indexOf('http') === 0) return u;
        if (API_BASE) return String(API_BASE).replace(/\/+$/, '') + p;
        const h = typeof location !== 'undefined' ? String(location.hostname || '') : '';
        if (/^cliniflow-backend[a-z0-9-]*\.onrender\.com$/i.test(h)) {
          const o = (typeof window.CLINIFLOW_ADMIN_API_ORIGIN === 'string' && window.CLINIFLOW_ADMIN_API_ORIGIN.trim())
            ? window.CLINIFLOW_ADMIN_API_ORIGIN.replace(/\/+$/, '')
            : 'https://cliniflow-admin.onrender.com';
          return o + p;
        }
        return u;
      }
      return API_BASE ? String(API_BASE).replace(/\/+$/, '') + p : p;
    }

    let ALL_PATIENTS = [];
    let CLINIC_PLAN = "";
    let CLINIC_MAX_PATIENTS = null;
    let DOCTORS_CACHE = [];
    let DOCTORS_BY_ID = {};

    /** UUID compare-safe + optional doctor_id (d_…) alias for DOCTORS_BY_ID */
    function normalizeDoctorKey(id) {
      const s = String(id == null ? "" : id).trim();
      if (!s) return "";

    function normalizePlanValue(planValue) {
      const raw = String(planValue || "").trim().toUpperCase();
      if (raw === "PROFESSIONAL") return "PRO";
      if (raw === "FREE" || raw === "BASIC" || raw === "PRO") return raw;
      return "FREE";
    }

    function getMaxPatients(plan, explicitMax) {
      if (explicitMax !== null && explicitMax !== undefined && explicitMax !== "") {
        const num = Number(explicitMax);
        return Number.isFinite(num) ? num : explicitMax;
      }
      if (plan === "FREE") return 3;
      if (plan === "BASIC") return 15;
      if (plan === "PRO") return null;
      return 3;
    }

    function renderUsageBadge() {
      const el = document.getElementById("usageBadge");
      if (!el) return;
      const plan = normalizePlanValue(CLINIC_PLAN || "FREE");
      const maxPatients = getMaxPatients(plan, CLINIC_MAX_PATIENTS);
      const used = ALL_PATIENTS.length;
      if (maxPatients === null || maxPatients === undefined) {
        el.textContent = `Plan: ${plan} • ${used} / ∞ patients`;
      } else {
        el.textContent = `Plan: ${plan} • ${used} / ${maxPatients} patients`;
      }
      el.style.display = "inline-flex";
      if (maxPatients !== null && maxPatients !== undefined && used >= maxPatients) {
        el.style.borderColor = "#f87171";
        el.style.background = "#fef2f2";
        el.style.color = "#b91c1c";
      } else {
        el.style.borderColor = "#cbd5e1";
        el.style.background = "#eff6ff";
        el.style.color = "#1e40af";
      }

    function applyFilters() {
      const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      const status = (document.getElementById('statusFilter')?.value || '').trim();

      const filtered = ALL_PATIENTS.filter((p) => {
        const pid = String(p.patientId || p.patient_id || '').toLowerCase();
        const name = String(p.fullName || p.name || '').toLowerCase();
        const phone = String(p.phone || '').toLowerCase();
        const clinic = String(p.clinicCode || p.clinic_code || '').toLowerCase();
        const st = String(p.status || 'PENDING');

        const qok = !q || pid.includes(q) || name.includes(q) || phone.includes(q) || clinic.includes(q);
        // DB stores "approved" as ACTIVE; filter option APPROVED matches ACTIVE + legacy APPROVED
        let sok = !status || st === status;
        if (status === "APPROVED") {
          sok = st === "APPROVED" || st === "ACTIVE";
        }
        return qok && sok;
      });

      renderPatients(filtered);
    }

    async function loadPatients() {
      const token = getAdminToken();
      if (!token) {
        document.getElementById('tokenInfo').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        return;
      }
      document.getElementById('tokenInfo').style.display = 'none';

      const loadingEl = document.getElementById('loading');
      const patientsGrid = document.getElementById('patientsGrid');

      loadingEl.style.display = 'block';
      patientsGrid.style.display = 'none';

      try {
        const patients = [];
        let page = 1;
        let totalPages = 1;
        const pageLimit = 100;

        while (page <= totalPages && page <= 40) {
          const res = await fetch(
            `${API_BASE}/api/admin/patients?page=${page}&limit=${pageLimit}`,
            {
              headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/json'
              }
            }
          );

          if (!res.ok) {
            if (res.status === 401) {
              const message = window.i18n ? window.i18n.t('patients.errors.unauthorized') : '❌ Yetkilendirme hatası. Lütfen tekrar giriş yapın.';
              showError(message);
              return;
            }
            throw new Error(`HTTP ${res.status}`);
          }

          const json = await res.json();
          let batch = [];
          if (Array.isArray(json)) {
            batch = json;
          } else if (json.ok && Array.isArray(json.patients)) {
            batch = json.patients;
          } else if (json.ok && Array.isArray(json.list)) {
            batch = json.list;
          } else {
            throw new Error(json.error || 'Invalid patients response');
          }
          patients.push(...batch);
          totalPages = Number(json.totalPages) || 1;
          if (batch.length < pageLimit) break;
          page += 1;
        }

        console.log('[PATIENTS] loaded', patients.length, 'rows across', page, 'page(s)');
        ALL_PATIENTS = patients;
        applyFilters();
        renderUsageBadge();
        
        loadingEl.style.display = 'none';
        patientsGrid.style.display = 'grid';
      } catch (error) {
        console.error('Load patients error:', error);
        const message = window.i18n ? window.i18n.t('patients.errors.loadFailed', { error: error.message }) : '❌ Hasta listesi yüklenemedi: ' + error.message;
        showError(message);
        loadingEl.style.display = 'none';
      }
    }

    async function approvePatient(patientId) {
      const token = getAdminToken();
      if (!token) {
        const message = window.i18n ? window.i18n.t('patients.errors.noToken') : '❌ Admin token bulunamadı';
        showError(message);
        return;
      }

      // Check patient limit before approval
      const limitCheck = await checkPatientLimit();
      if (!limitCheck.canApprove) {
        showPatientLimitModal(limitCheck);
        return;
      }

      const confirmMessage = window.i18n ? window.i18n.t('patients.approveConfirm', { patientId }) : `Hastayı onaylamak istediğinize emin misiniz? (${patientId})`;
      if (!confirm(confirmMessage)) {
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/admin/approve`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ patientId })
        });

        const json = await res.json().catch(() => ({}));
        if (!res.ok || !json.ok) {
          throw new Error(json.message || json.error || 'Onaylama başarısız');
        }

        const successMessage = window.i18n ? window.i18n.t('patients.approveSuccess') : '✅ Hasta onaylandı';
        alert(successMessage);
        loadPatients();
      } catch (error) {
        console.error('Approve error:', error);
        const message = window.i18n ? window.i18n.t('patients.errors.approveFailed', { error: error.message }) : '❌ Onaylama hatası: ' + error.message;
        showError(message);
      }
    }

    async function checkPatientLimit() {
      const token = getAdminToken();
      if (!token) {
        return { canApprove: false, error: 'No token' };
      }

      try {
        // Get clinic info to check plan
        const clinicRes = await fetch(`${API_BASE}/api/admin/clinic`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/json'
          }
        });

        if (!clinicRes.ok) {
          return { canApprove: true }; // If we can't check, allow approval
        }

        const clinic = await clinicRes.json();
        // Must match GET /api/admin/clinic: plan lives in `plan` (Supabase) not only subscriptionPlan
        const plan = normalizePlanValue(
          clinic.subscriptionPlan ||
            clinic.plan ||
            clinic.settings?.subscriptionPlan ||
            'FREE'
        );

        // Get current approved patients count
        const patientsRes = await fetch(`${API_BASE}/api/admin/patients?status=APPROVED`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/json'
          }
        });

        if (!patientsRes.ok) {
          return { canApprove: true }; // If we can't check, allow approval
        }

        const payload = await patientsRes.json();
        const list = Array.isArray(payload)
          ? payload
          : payload?.patients || payload?.list || [];
        const currentApproved = list.filter((p) => {
          const s = String(p.status || "").toUpperCase();
          return s === "APPROVED" || s === "ACTIVE";
        }).length;
        
        // Align with server planToMaxPatients (index.cjs)
        const limits = {
          'FREE': 3,
          'BASIC': 15,
          'PRO': Infinity
        };

        const limit = limits[plan] ?? 3;
        const canApprove = currentApproved < limit;

        return {
          canApprove,
          current: currentApproved,
          limit,
          plan,
          clinic
        };
      } catch (error) {
        console.error('Limit check error:', error);
        return { canApprove: true }; // If check fails, allow approval
      }
    }

    function showPatientLimitModal(limitCheck) {
      const modal = document.createElement('div');
      modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.8);
        display: flex;
        align-items: center;
        justify-content: center;

      `;

      const continueButton = window.i18n ? window.i18n.t('patients.limits.continueButton') : 'Mevcut Hastalarla Devam Et';

        <h2 style="margin: 0 0 16px 0; color: var(--warning, #f59e0b); font-size: 24px;">⚠️ ${title}</h2>

    function getPatientNameById(patientId) {
      const found = ALL_PATIENTS.find(
        (p) => String(p.patientId || p.patient_id || "") === String(patientId || "")
      );
      return (found?.fullName || found?.name || "").toString();
    }

    // Add Patient Modal Functions
    function showAddPatientModal() {
      document.getElementById('addPatientModal').style.display = 'flex';
      document.getElementById('addPatientForm').reset();
    }

    function hideAddPatientModal() {
      document.getElementById('addPatientModal').style.display = 'none';
    }

    async function addPatient() {
      try {
        const formData = {
          firstName: document.getElementById('patientFirstName').value.trim(),
          lastName: document.getElementById('patientLastName').value.trim(),
          email: document.getElementById('patientEmail').value.trim(),
          phone: document.getElementById('patientPhone').value.trim(),
          dateOfBirth: document.getElementById('patientDateOfBirth').value,
          address: document.getElementById('patientAddress').value.trim(),
          notes: document.getElementById('patientNotes').value.trim()
        };

        if (!formData.firstName || !formData.lastName) {
          alert('First name and last name are required');
          return;
        }

        const token = getAdminToken();
        if (!token) {
          alert('Authentication required');
          return;
        }

        const response = await fetch(`${API_BASE}/api/admin/patients`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Failed to add patient');
        }

        const data = await response.json();
        if (!data.ok) {
          throw new Error(data.error || 'Failed to add patient');
        }

        hideAddPatientModal();
        loadPatients(); // Refresh patient list
        
        // Show success message
        const successMsg = window.i18n ? 
          window.i18n.t('patients.addSuccess') : 
          'Patient added successfully!';
        alert(successMsg);

      } catch (error) {
        console.error('[PATIENTS] Add error:', error);
        const errorMsg = window.i18n ? 
          window.i18n.t('patients.addError') : 
          'Failed to add patient: ' + error.message;
        alert(errorMsg);
      }
    }

    // Badge loading functions
    function adminHeaders(extra = {}) {
      const token = getAdminToken();
      return {
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...extra,
      };
    }

    let previousUnreadCount = 0;
    let previousPendingPatients = 0;
    let previousPendingReferrals = 0;

    function playNotificationSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
      } catch (e) {
        console.warn("Could not play notification sound:", e);
      }
    }

    async function loadUnreadMessageCount() {
      const token = getAdminToken();
      if (!token) return;
      try {
        const res = await fetch(patientsFetchUrl('/api/admin/messages/unread-counts?totalOnly=1'), {
          headers: adminHeaders({ Accept: "application/json" }),
        });
        if (!res.ok) return;
        const data = await res.json();
        if (!data.ok) return;

        const totalUnread = Number(data.total || 0);
        if (totalUnread > previousUnreadCount && previousUnreadCount > 0) {
          playNotificationSound();
        }
        previousUnreadCount = totalUnread;
        const badgeEl = document.getElementById("chatBadge");
        if (badgeEl) {
          if (totalUnread > 0) {
            badgeEl.textContent = totalUnread > 99 ? "99+" : String(totalUnread);
            badgeEl.style.display = "flex";
          } else {
            badgeEl.style.display = "none";
          }
        }
      } catch (error) {
        console.error("Load unread count error:", error);
      }
    }

    async function loadPendingPatientsCount() {
      const token = getAdminToken();
      if (!token) return;
      try {
        let patients = ALL_PATIENTS;
        if (!Array.isArray(patients) || patients.length === 0) {
          const res = await fetch(patientsFetchUrl('/api/admin/patients'), {
            headers: adminHeaders({ Accept: "application/json" }),
          });
          if (!res.ok) return;
          const data = await res.json();

          if (Array.isArray(data)) {
            patients = data;
          } else if (data.ok && Array.isArray(data.patients)) {
            patients = data.patients;
          } else if (data.ok && Array.isArray(data.list)) {
            patients = data.list;
          } else {
            return;
          }
        }
        const pendingCount = patients.filter(p => (p.status || "PENDING") === "PENDING").length;
        if (pendingCount > previousPendingPatients && previousPendingPatients > 0) {
          playNotificationSound();
        }
        previousPendingPatients = pendingCount;
        const badgeEl = document.getElementById("patientsBadge");
        if (badgeEl) {
          if (pendingCount > 0) {
            badgeEl.textContent = pendingCount > 99 ? "99+" : String(pendingCount);
            badgeEl.style.display = "flex";
          } else {
            badgeEl.style.display = "none";
          }
        }
      } catch (error) {
        console.error("Load pending patients count error:", error);
      }
    }

    async function loadPendingReferralsCount() {
      const token = getAdminToken();
      if (!token) return;
      try {
        const res = await fetch(patientsFetchUrl('/api/admin/referrals?status=PENDING'), {
          headers: adminHeaders({ Accept: "application/json" }),
        });
        if (!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        const pendingCount = items.length;
        if (pendingCount > previousPendingReferrals && previousPendingReferrals > 0) {
          playNotificationSound();
        }
        previousPendingReferrals = pendingCount;
        const badgeEl = document.getElementById("referralsBadge");
        if (badgeEl) {
          if (pendingCount > 0) {
            badgeEl.textContent = pendingCount > 99 ? "99+" : String(pendingCount);
            badgeEl.style.display = "flex";
          } else {
            badgeEl.style.display = "none";
          }
        }
      } catch (error) {
        console.error("Load pending referrals count error:", error);
      }
    }

    async function loadAllBadges() {
      await Promise.all([
        loadUnreadMessageCount(),
        loadPendingPatientsCount(),
        loadPendingReferralsCount()
      ]);
    }

    window.rerenderPatientsI18n = function() {
      renderSelectedBar();
      applyFilters();
      updateStatusFilterOptions();
      updateLangToggle();
      updateNavbar();
    };

    function updateNavbar() {
      if (!window.i18n) return;
      // Custom nav (non-layout): sync labels with current lang
      const patientsNavLink = document.getElementById('patientsNavLink');
      if (patientsNavLink) {
        const span = patientsNavLink.querySelector('span[data-i18n]');
        if (span) {
          span.textContent = window.i18n.t('dashboard.nav.patients');
        }
      }
      const chatNavLink = document.getElementById('chatNavLink');
      if (chatNavLink) {
        const span = chatNavLink.querySelector('span[data-i18n]');
        if (span) {
          span.textContent = window.i18n.t('dashboard.nav.chat');
        }
      }
    }

    function updateStatusFilterOptions() {
      const filter = document.getElementById('statusFilter');
      if (filter && window.i18n) {
        const firstOption = filter.querySelector('option[value=""]');
        if (firstOption) {
          firstOption.textContent = window.i18n.t('patients.filterAll');
        }
        const pendingOption = filter.querySelector('option[value="PENDING"]');
        if (pendingOption) {
          pendingOption.textContent = window.i18n.t('patients.status.PENDING');
        }
        const approvedOption = filter.querySelector('option[value="APPROVED"]');
        if (approvedOption) {
          approvedOption.textContent = window.i18n.t('patients.status.APPROVED');
        }
      }

    function updateLangToggle() {
      if (!window.i18n) return;
      const langTr = document.getElementById('lang-tr');
      const langEn = document.getElementById('lang-en');
      const currentLang = window.i18n.getLang();
      if (langTr) {
        langTr.classList.toggle('active', currentLang === 'tr');
      }
      if (langEn) {
        langEn.classList.toggle('active', currentLang === 'en');
      }
    }

    // Load on page load
    window.addEventListener('load', async () => {
      // Wait for i18n to be ready
      if (window.i18n) {
        updateLangToggle();
        updateStatusFilterOptions();
        updateNavbar();
      }
      
      await loadDoctorsCache();
      await Promise.all([
        loadPatients(),
        loadClinicBadge()
      ]);
      renderSelectedBar();
      const s = document.getElementById('searchInput');
      const f = document.getElementById('statusFilter');
      if (s) s.addEventListener('input', () => applyFilters());
      if (f) f.addEventListener('change', () => applyFilters());
      loadAllBadges();
    });

    // Auto-refresh badges every 30 seconds
    setInterval(loadAllBadges, 30000);

    // Load doctors for assignment dropdown
    async function loadDoctors() {
      const token = getAdminToken();

      if (!token) return [];

      try {
        const res = await fetch(patientsFetchUrl('/api/admin/doctors'), {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          console.error("Doctors fetch failed:", res.status);
          return [];
        }

        const data = await res.json();

        if (Array.isArray(data.items)) return data.items;
        if (Array.isArray(data.doctors)) return data.doctors;
        if (Array.isArray(data)) return data;

        return [];
      } catch (e) {
        console.error("Doctor load error:", e);
        return [];
      }
    }

    async function loadDoctorsCache(force) {
      if (!force && DOCTORS_CACHE.length > 0) {
        return DOCTORS_CACHE;
      }

      const doctors = await loadDoctors();
      DOCTORS_CACHE = doctors;
      DOCTORS_BY_ID = {};
      for (const doctor of doctors || []) {
        if (!doctor) continue;
        const nk = normalizeDoctorKey(doctor.id);
        if (nk) DOCTORS_BY_ID[nk] = doctor;
        const code = doctor.doctor_id != null ? String(doctor.doctor_id).trim() : "";
        if (code) DOCTORS_BY_ID[code] = doctor;
      }
      return doctors;
    }

    // Assign doctor to patient
    async function assignDoctor(patientId) {
      const token = getAdminToken();
      if (!token) {
        alert('Admin token required');
        return;
      }

      const doctorId = document.getElementById(`doctor-${patientId}`).value;
      
      // ✅ 1️⃣ Assign Butonunu Akıllı Yap
      if (!doctorId) {
        alert("Please select a doctor");
        return;
      }

      const btn = event?.target;
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Assigning...";
      }

      try {
        const res = await fetch(patientsFetchUrl('/api/admin/patients/assign-doctor'), {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ patientId, doctorId })
        });

        if (!res.ok) {
          const responseText = await res.text();
          let errorMessage = 'Unknown error';
          try {
            const errorJson = JSON.parse(responseText || '{}');
            errorMessage = errorJson.message || errorJson.error || errorMessage;
          } catch (_) {
            errorMessage = `HTTP ${res.status}`;
          }
          alert(`Failed to assign doctor: ${errorMessage}`);
          return;
        }

        const result = await res.json();
        if (result.ok) {
          // Doktor listesi cache’i eski kalıyordu; yeni doktor / clinic_code ile eşleşme için yenile
          await loadDoctorsCache(true);
          await loadPatients();
        }
      } catch (error) {
        console.error('Error assigning doctor:', error);
        alert('Failed to assign doctor');
      } finally {
        // ✅ 1️⃣ Assign Butonunu Akıllı Yap - Reset
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Assign";
        }
      }
    }
